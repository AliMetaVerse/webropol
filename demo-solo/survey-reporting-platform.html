<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webropol Survey &amp; Reporting Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            'webropol-primary': { 50: '#f0fdff', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 900: '#164e63' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #e8f0f6; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }

    /* ===== Slider track ===== */
    .slider-viewport { width: 100%; overflow: hidden; }
    .slider-track {
      display: flex;
      width: 200%;
      transition: transform .8s cubic-bezier(.65, 0, .25, 1);
    }
    .slide { width: 50%; flex: 0 0 50%; padding: 0 1.5rem; }

    .arch-img { width: 100%; max-width: 1100px; height: auto; margin: 0 auto; display: block; }
    .arch-img-sm { max-width: 820px; opacity: .96; }

    /* ===== Slide 2 typography ===== */
    .eyebrow {
      display: inline-flex; align-items: center; gap: .65rem;
      font-size: .8rem; font-weight: 700; letter-spacing: .28em;
      text-transform: uppercase; color: #5b86a0;
    }
    .eyebrow::before, .eyebrow::after {
      content: ''; width: 34px; height: 2px; border-radius: 2px;
      background: linear-gradient(90deg, transparent, #9ec3d3);
    }
    .eyebrow::after { background: linear-gradient(90deg, #9ec3d3, transparent); }

    .lead-statement {
      font-size: clamp(2rem, 4.2vw, 3.4rem);
      font-weight: 800; line-height: 1.12; letter-spacing: -.02em;
      color: #0e4f6b;
    }
    .lead-statement .hl {
      background: linear-gradient(120deg, #0891b2, #0e7490);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .accent-rule {
      width: 64px; height: 4px; margin: 1.6rem auto; border-radius: 9999px;
      background: linear-gradient(90deg, #06b6d4, #0e7490);
    }

    .sub-statement {
      font-size: clamp(1.1rem, 2.1vw, 1.6rem);
      font-weight: 500; line-height: 1.5; color: #3b5a68;
      max-width: 46rem; margin: 0 auto;
    }
    .sub-statement strong { color: #0e7490; font-weight: 700; }

    /* ===== Slide 1 hero ===== */
    .hero-title {
      font-size: clamp(2.6rem, 6vw, 4.6rem);
      font-weight: 800; line-height: 1.05; letter-spacing: -.03em;
      color: #0e4f6b;
    }
    .hero-title .grad {
      background: linear-gradient(120deg, #06b6d4, #0e7490 55%, #164e63);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .hero-tagline {
      font-size: clamp(1rem, 1.8vw, 1.35rem);
      font-weight: 500; letter-spacing: .01em; color: #4a6b78;
      max-width: 40rem; margin: 0 auto;
    }
    .hero-rule {
      width: 72px; height: 4px; margin: 1.4rem auto 1.6rem; border-radius: 9999px;
      background: linear-gradient(90deg, #06b6d4, #0e7490);
    }

    /* Title fade/slide-in when its slide is active */
    .reveal { opacity: 0; transform: translateY(16px); transition: opacity .7s ease, transform .7s ease; }
    .slide-active .reveal { opacity: 1; transform: translateY(0); }
    .slide-active .d-1 { transition-delay: .15s; }
    .slide-active .d-2 { transition-delay: .45s; }
    .slide-active .d-3 { transition-delay: .7s; }

    /* ===== Toggle button ===== */
    .nav-btn {
      display: inline-flex; align-items: center; gap: .6rem;
      padding: .85rem 1.75rem; border-radius: 9999px;
      background: linear-gradient(135deg, #0891b2, #0e7490);
      color: #fff; font-weight: 600; font-size: 1rem;
      box-shadow: 0 8px 22px rgba(14,116,144,.35);
      transition: transform .2s ease, box-shadow .2s ease;
      cursor: pointer; border: none;
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(14,116,144,.45); }
    .nav-btn:active { transform: translateY(0); }

    .dots { display: flex; gap: .5rem; }
    .dot { width: 9px; height: 9px; border-radius: 9999px; background: #b6cdd9; transition: all .3s ease; cursor: pointer; }
    .dot.active { background: #0e7490; width: 26px; }
  </style>
</head>
<body class="min-h-screen flex flex-col py-10">

  <!-- ===== Slider ===== -->
  <div class="slider-viewport flex-1">
    <div class="slider-track" id="track">

      <!-- Slide 1: ONE title -->
      <section class="slide slide-active" id="slide-0">
        <header class="text-center max-w-5xl mx-auto mb-6">
          <h1 class="reveal d-1 hero-title mt-5">
            Webropol <span class="grad">Survey &amp; Reporting</span> Platform
          </h1>
          <div class="reveal d-2 hero-rule"></div>
        </header>
        <img src="../img/svg/MainArchWebro.svg" alt="Webropol platform architecture" class="reveal d-3 arch-img">
      </section>

      <!-- Slide 2: TWO titles -->
      <section class="slide" id="slide-1">
        <header class="text-center max-w-4xl mx-auto mb-8">
          <span class="reveal d-1 eyebrow">Webropol Survey &amp; Reporting Platform</span>
          <p class="reveal d-2 lead-statement mt-6">
            Internationally <span class="hl">recognised</span> as a high-level solution.
          </p>
          <div class="reveal d-2 accent-rule"></div>
          <p class="reveal d-3 sub-statement">
            With all additional modules, Webropol is a
            <strong>globally unique application platform</strong>.
          </p>
        </header>
        <img src="../img/svg/MainArchWebro.svg" alt="Webropol platform architecture" class="reveal d-3 arch-img arch-img-sm">
      </section>

    </div>
  </div>

  <!-- ===== Bottom controls ===== -->
  <footer class="mt-6 flex flex-col items-center gap-4">
    <div class="dots" id="dots">
      <span class="dot active" data-i="0"></span>
      <span class="dot" data-i="1"></span>
    </div>
    <button class="nav-btn" id="navBtn">
      <span id="navLabel">Show details</span>
      <i class="fa-solid fa-arrow-right" id="navIcon"></i>
    </button>
  </footer>

  <script>
    const track    = document.getElementById('track');
    const slides   = [document.getElementById('slide-0'), document.getElementById('slide-1')];
    const dots     = [...document.querySelectorAll('.dot')];
    const navBtn   = document.getElementById('navBtn');
    const navLabel = document.getElementById('navLabel');
    const navIcon  = document.getElementById('navIcon');
    let index = 0;

    function goTo(i) {
      index = i;
      track.style.transform = `translateX(-${i * 50}%)`;
      slides.forEach((s, n) => s.classList.toggle('slide-active', n === i));
      dots.forEach((d, n) => d.classList.toggle('active', n === i));
      if (i === 0) {
        navLabel.textContent = 'Show details';
        navIcon.className = 'fa-solid fa-arrow-right';
      } else {
        navLabel.textContent = 'Back';
        navIcon.className = 'fa-solid fa-arrow-left';
      }
    }

    navBtn.addEventListener('click', () => goTo(index === 0 ? 1 : 0));
    dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.i)));

    // initial reveal
    requestAnimationFrame(() => slides[0].classList.add('slide-active'));
  </script>
</body>
</html>
