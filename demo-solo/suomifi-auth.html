<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suomi.fi e-Identification · Webropol</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background-color: #E8EEF5; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-appear { animation: fadeUp 0.4s ease both; }

    .lang-btn {
      font-size: 0.75rem;
      font-weight: 500;
      color: #6b7280;
      padding: 0.3rem 0.8rem;
      border-radius: 0.4rem;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      line-height: 1.5;
    }
    .lang-btn:hover:not(.active) { background-color: #f3f4f6; color: #374151; }
    .lang-btn.active {
      background-color: #06b6d4;
      color: #fff;
      font-weight: 600;
    }

    .identify-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      background-color: #003F6B;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.9rem 1.5rem;
      border-radius: 9999px;
      text-decoration: none;
      transition: background-color 0.2s ease;
      letter-spacing: 0.01em;
    }
    .identify-btn:hover { background-color: #002E52; }

    .identify-btn .icon-ring {
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-12">

  <!-- Language selector -->
  <div class="w-full max-w-md mb-5 flex items-center justify-end gap-2.5">
    <span class="text-xs text-gray-500 font-medium select-none">Select Language:</span>
    <div class="flex items-center bg-white rounded-lg border border-gray-200 p-0.5 gap-0.5">
      <button class="lang-btn" data-lang="fi">FI</button>
      <button class="lang-btn" data-lang="sv">SV</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>

  <!-- Main card -->
  <div class="card-appear w-full max-w-md bg-white rounded-2xl border border-gray-100" style="box-shadow: 0 2px 16px rgba(0,0,0,0.08);">
    <div class="px-8 py-8">

      <!-- Logo + title -->
      <div class="flex items-start gap-4 mb-6">
        <div class="w-14 h-14 rounded-xl bg-[#003F6B] flex items-center justify-center flex-shrink-0 overflow-hidden">
          <img src="../img/brands/suomi.fi.logo.png" class="w-10 h-10 object-contain" alt="Suomi.fi">
        </div>
        <div class="pt-0.5">
          <h1 class="text-xl font-bold text-gray-900 leading-snug"
              data-i18n="true"
              data-fi="Suomi.fi-tunnistus"
              data-sv="Suomi.fi-identifiering"
              data-en="Suomi.fi e-Identification">Suomi.fi e-Identification</h1>
          <p class="text-sm text-gray-400 mt-0.5"
             data-i18n="true"
             data-fi="Kyselynimi"
             data-sv="Enkätnamn"
             data-en="Survey: NPS for Hospital Customers">Survey: NPS for Hospital Customers</p>
        </div>
      </div>

      <!-- Description -->
      <p class="text-sm text-gray-600 leading-relaxed mb-7"
         data-i18n="true"
         data-fi="Tämä lomake vaatii henkilöllisyyden vahvistamisen Suomi.fi-tunnistuspalvelun kautta ennen vastaamista."
         data-sv="Det här formuläret kräver identifiering via Suomi.fi-tjänsten innan du kan svara."
         data-en="This form requires identity verification via Suomi.fi identification service before responding.">
        This form requires identity verification via Suomi.fi identification service before responding.
      </p>

      <!-- Identify button -->
      <a href="suomifi-thankyou.html" class="identify-btn">
        <span class="icon-ring">
          <i class="fa-light fa-user-check" style="font-size: 0.6rem;"></i>
        </span>
        <span data-i18n="true"
              data-fi="Tunnistaudu Suomi.fi:ssä"
              data-sv="Identifiera dig via Suomi.fi"
              data-en="Identify via Suomi.fi">Identify via Suomi.fi</span>
      </a>

    </div>
  </div>

  <!-- Sticky footer -->
  <footer class="fixed bottom-0 inset-x-0 bg-white" style="box-shadow:0 -1px 0 rgba(0,0,0,0.06),0 -8px 24px rgba(0,0,0,0.05);">
    <div class="flex items-center justify-center gap-3 py-3.5">
      <img src="../img/logo/W-logo-dark.svg" class="h-5 w-auto" alt="Webropol">
      <span class="text-sm text-gray-400">Powered by
        <a href="https://webropol.com" target="_blank" rel="noopener"
           class="font-semibold text-gray-700 hover:text-[#003F6B] transition-colors">Webropol</a>
      </span>
      <span class="text-gray-200 select-none">&bull;</span>
      <a href="https://webropol.com" target="_blank" rel="noopener"
         class="text-sm font-medium text-[#06b6d4] hover:text-[#0891b2] transition-colors"
         data-i18n="true"
         data-fi="Lue lisää"
         data-sv="Läs mer"
         data-en="Click here to read more">Click here to read more</a>
    </div>
  </footer>

  <script>
    const LANGS = ['fi', 'sv', 'en'];

    function detectLang() {
      const candidates = navigator.languages
        ? Array.from(navigator.languages)
        : [navigator.language || 'fi'];
      for (const candidate of candidates) {
        const code = candidate.toLowerCase().slice(0, 2);
        if (LANGS.includes(code)) return code;
      }
      return 'fi';
    }

    function setLang(lang) {
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n="true"]').forEach(el => {
        const text = el.getAttribute('data-' + lang);
        if (text !== null) el.textContent = text;
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      try { sessionStorage.setItem('suomifi_lang', lang); } catch (_) {}
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.lang));
    });

    // Auto-detect: prefer saved session lang, then browser language
    const saved = (() => { try { return sessionStorage.getItem('suomifi_lang'); } catch (_) { return null; } })();
    setLang(saved && LANGS.includes(saved) ? saved : detectLang());
  </script>
</body>
</html>
