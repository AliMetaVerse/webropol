<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeWidget — Webropol Design System</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'webropol-primary': { 50: '#f0fdff', 100: '#ccf7fe', 200: '#99effd', 300: '#66e0fa', 400: '#22ccf1', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63' },
            'webropol-gray': { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' },
            'webropol-green': { 50: '#f0fdf4', 100: '#dcfce7', 700: '#15803d' },
            'webropol-orange': { 50: '#fff7ed', 100: '#ffedd5', 700: '#c2410c' },
            'webropol-royalViolet': { 50: '#f5f3ff', 100: '#ede9fe', 700: '#6d28d9' }
          },
          boxShadow: {
            card: '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
            medium: '0 4px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>

  <script src="../components/cards/HomeWidget.js" type="module"></script>
  <script src="../components/cards/ListCard.js" type="module"></script>
  <script src="../components/feedback/Badge.js" type="module"></script>

  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
    .page { max-width: 1180px; margin: 0 auto; padding: 40px 24px 80px; }
    h1 { font-size: 2rem; font-weight: 700; margin: 0 0 8px; }
    .lead { color: #475569; max-width: 760px; margin: 0 0 32px; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; font-size: 0.875rem; }
    .breadcrumb a { color: #0e7490; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
  </style>
</head>
<body>
<main class="page">
  <nav class="breadcrumb">
    <a href="../index.html">Component Library</a>
    <i class="fal fa-chevron-right" style="font-size:10px"></i>
    <a href="cards-demo.html">Cards</a>
    <i class="fal fa-chevron-right" style="font-size:10px"></i>
    <span>HomeWidget</span>
  </nav>

  <h1>HomeWidget</h1>
  <p class="lead">A reusable section container for dashboard-style landing pages. It pairs well with single-mode ListCard entries for grouped navigation like MyWebropol, support hubs, or admin launchpads.</p>

  <div class="grid">
    <webropol-home-widget
      eyebrow="Library"
      title="Templates and Libraries"
      description="Access your most-used template collections and reusable content from one grouped widget."
      icon="books"
      tone="primary"
      action-label="See all"
      action-href="#">
      <webropol-list-card mode="single" title="Email Templates" subtitle="Pre-designed campaigns and notification layouts" icon="envelope" href="#">
        <webropol-badge variant="primary" size="sm">24</webropol-badge>
      </webropol-list-card>
      <webropol-list-card mode="single" title="Branding" subtitle="Shared assets and layout patterns" icon="layer-group" href="#">
        <webropol-badge variant="neutral" size="sm">18 assets</webropol-badge>
      </webropol-list-card>
      <webropol-list-card mode="single" title="Question Library" subtitle="Reusable survey questions and blocks" icon="book-open" href="#">
        <webropol-badge variant="success" size="sm">156 items</webropol-badge>
      </webropol-list-card>
    </webropol-home-widget>

    <webropol-home-widget
      eyebrow="Support"
      title="Help Centre and Agreements"
      description="Expose support, training, and trust materials through a consistent, page-level widget shell."
      icon="life-ring"
      tone="royal">
      <webropol-list-card mode="single" title="Help Centre" subtitle="Guides, onboarding, and video training" icon="circle-question" href="#">
        <webropol-badge variant="secondary" size="sm">Popular</webropol-badge>
      </webropol-list-card>
      <webropol-list-card mode="single" title="Agreements" subtitle="Contracts, product terms, and account policy" icon="file-contract" href="#">
        <webropol-badge variant="neutral" size="sm">Legal</webropol-badge>
      </webropol-list-card>
      <webropol-list-card mode="single" title="Data Security" subtitle="Security white paper and governance references" icon="shield-check" href="#">
        <webropol-badge variant="warning" size="sm">Updated</webropol-badge>
      </webropol-list-card>
    </webropol-home-widget>
  </div>
</main>
</body>
</html>
