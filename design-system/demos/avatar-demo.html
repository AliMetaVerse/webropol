<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar — Webropol Design System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'webropol-primary': { 100: '#ccf7fe', 700: '#0e7490' },
            'webropol-gray': { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 500: '#64748b', 700: '#334155', 900: '#0f172a' },
            'webropol-green': { 100: '#dcfce7', 700: '#15803d' },
            'webropol-purple': { 100: '#f3e8ff', 700: '#7c3aed' },
            'webropol-orange': { 100: '#ffedd5', 700: '#c2410c' }
          },
          boxShadow: {
            soft: '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04)'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <script src="../components/feedback/Avatar.js" type="module"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
    .page { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 24px; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; font-size: 0.875rem; }
    .breadcrumb a { color: #0e7490; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    h1 { font-size: 2rem; font-weight: 700; margin: 0 0 8px; }
    .lead { color: #64748b; margin: 0 0 32px; max-width: 720px; }
  </style>
</head>
<body>
<main class="page">
  <nav class="breadcrumb">
    <a href="../index.html">Component Library</a>
    <i class="fal fa-chevron-right" style="font-size:10px"></i>
    <a href="feedback-demo.html">Feedback</a>
    <i class="fal fa-chevron-right" style="font-size:10px"></i>
    <span>Avatar</span>
  </nav>

  <h1>Avatar</h1>
  <p class="lead">Compact icon avatars for stat cards, launch surfaces, and compact metadata summaries. Variants are aligned to the MyWebropol top-card treatments.</p>

  <div class="grid">
    <div class="card"><webropol-avatar variant="primary" size="lg" icon="envelope"></webropol-avatar></div>
    <div class="card"><webropol-avatar variant="success" size="lg" icon="book-open"></webropol-avatar></div>
    <div class="card"><webropol-avatar variant="violet" size="lg" icon="layer-group"></webropol-avatar></div>
    <div class="card"><webropol-avatar variant="orange" size="lg" icon="sms"></webropol-avatar></div>
  </div>
</main>
</body>
</html>
