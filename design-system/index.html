<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Library — Webropol Design System</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'webropol-primary': {
              50: '#eefbfd', 100: '#d5f4f8', 200: '#b0e8f1', 300: '#79d6e7',
              400: '#3fbcd5', 500: '#209fba', 600: '#1d809d', 700: '#1e6880',
              800: '#215669', 900: '#204859', 950: '#102e3c'
            },
            'webropol-gray': {
              50: '#f9fafa', 100: '#f3f4f4', 200: '#e6e7e8', 300: '#d1d5d6',
              400: '#b5bbbd', 500: '#9ba2a4', 600: '#787f81', 700: '#61686a',
              800: '#515557', 900: '#45484a', 950: '#272a2b'
            },
            'webropol-royalViolet': { 500: '#823bdd', 600: '#6922c4', 700: '#511a98' },
            'webropol-royalBlue':   { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
            'webropol-royalTurquoise': { 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490' },
            'webropol-success': { 500: '#579f48', 600: '#448237' },
            'webropol-warning': { 500: '#f5980b', 600: '#d97106' },
            'webropol-danger':  { 500: '#f43f63', 600: '#e11d4e' }
          },
          fontFamily: { 'sans': ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    [x-cloak] { display: none !important; }

    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #d1d5d6; border-radius: 4px; }
    .sidebar-scroll::-webkit-scrollbar-thumb:hover { background: #9ba2a4; }

    .cat-items {
      overflow: hidden;
      transition: max-height 0.22s ease, opacity 0.18s ease;
      max-height: 0;
      opacity: 0;
    }
    .cat-items.open {
      max-height: 1400px;
      opacity: 1;
    }

    .sidebar-item-active {
      background: #eefbfd;
      color: #1e6880;
      border-color: #b0e8f1;
    }

    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, #f3f4f4 25%, #e6e7e8 50%, #f3f4f4 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
    }
  </style>
</head>

<body class="h-screen overflow-hidden font-sans bg-webropol-gray-50" x-data="libraryApp()" x-init="init()">

  <!-- TOP HEADER -->
  <div class="h-14 flex items-center gap-3 px-4 border-b border-webropol-gray-200 bg-white/95 backdrop-blur shrink-0" style="position:relative;z-index:10">
    <a href="../index.html" class="flex items-center gap-2 text-webropol-gray-500 hover:text-webropol-primary-700 transition-colors shrink-0">
      <i class="fal fa-arrow-left text-sm"></i>
    </a>
    <div class="w-px h-5 bg-webropol-gray-200 shrink-0"></div>
    <div class="flex items-center gap-2 shrink-0">
      <i class="fal fa-layer-group text-webropol-primary-600 text-sm"></i>
      <span class="text-sm font-semibold text-webropol-gray-900">Component Library</span>
      <span class="hidden sm:inline-flex items-center px-2 py-0.5 bg-webropol-primary-100 text-webropol-primary-700 rounded-full text-xs font-semibold">
        <span x-text="visibleCount"></span>&thinsp;components
      </span>
    </div>

    <div class="flex-1"></div>

    <!-- Search -->
    <div class="relative w-64">
      <i class="fal fa-search absolute left-3 top-1/2 -translate-y-1/2 text-webropol-gray-400 text-xs pointer-events-none"></i>
      <input
        type="text"
        x-model="search"
        @input="filterComponents()"
        placeholder="Search components..."
        class="w-full pl-8 pr-7 py-1.5 text-sm bg-webropol-gray-50 border border-webropol-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-webropol-primary-300 focus:border-webropol-primary-400 placeholder-webropol-gray-400"
      >
      <button x-show="search" @click="search=''; filterComponents()" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-webropol-gray-400 hover:text-webropol-gray-600">
        <i class="fal fa-times text-xs"></i>
      </button>
    </div>

    <!-- Demo filter pills -->
    <div class="hidden md:flex items-center gap-1.5 shrink-0">
      <button @click="demoFilter='all'; filterComponents()"
        :class="demoFilter==='all' ? 'bg-webropol-gray-900 text-white' : 'bg-webropol-gray-100 text-webropol-gray-600 hover:bg-webropol-gray-200'"
        class="px-2.5 py-1 rounded-lg text-xs font-medium transition-colors">All</button>
      <button @click="demoFilter='demo'; filterComponents()"
        :class="demoFilter==='demo' ? 'bg-green-600 text-white' : 'bg-webropol-gray-100 text-webropol-gray-600 hover:bg-webropol-gray-200'"
        class="px-2.5 py-1 rounded-lg text-xs font-medium transition-colors">Has Demo</button>
      <button @click="demoFilter='nodemo'; filterComponents()"
        :class="demoFilter==='nodemo' ? 'bg-amber-500 text-white' : 'bg-webropol-gray-100 text-webropol-gray-600 hover:bg-webropol-gray-200'"
        class="px-2.5 py-1 rounded-lg text-xs font-medium transition-colors">No Demo</button>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="flex" style="height: calc(100vh - 56px)">

    <!-- LEFT SIDEBAR -->
    <div class="w-64 flex-shrink-0 border-r border-webropol-gray-200 bg-white flex flex-col overflow-hidden">

      <!-- Overview button -->
      <div class="px-3 pt-3 pb-2 border-b border-webropol-gray-100 shrink-0">
        <button
          @click="selectOverview()"
          :class="!selectedDemo ? 'sidebar-item-active border' : 'text-webropol-gray-600 hover:bg-webropol-gray-100 border border-transparent'"
          class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm font-medium transition-colors cursor-pointer">
          <i class="fal fa-layout-grid w-4 text-center text-sm shrink-0"
             :class="!selectedDemo ? 'text-webropol-primary-600' : 'text-webropol-gray-400'"></i>
          <span>Overview</span>
          <span class="ml-auto text-xs font-semibold"
                :class="!selectedDemo ? 'text-webropol-primary-500' : 'text-webropol-gray-400'"
                x-text="visibleCount"></span>
        </button>
      </div>

      <!-- Scrollable category list -->
      <div class="flex-1 overflow-y-auto sidebar-scroll p-3 space-y-0.5">

        <template x-for="cat in filteredCategories" :key="cat.id">
          <div x-show="cat.visible">

            <!-- Category header row -->
            <button
              @click="toggleCategory(cat.id)"
              class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-xs font-semibold tracking-wide uppercase text-webropol-gray-500 hover:bg-webropol-gray-100 hover:text-webropol-gray-800 transition-colors cursor-pointer group mt-1">
              <div class="w-5 h-5 rounded-md flex items-center justify-center shrink-0" :class="cat.bg">
                <i :class="'fal ' + cat.icon + ' ' + cat.iconColor" style="font-size:10px"></i>
              </div>
              <span class="flex-1 text-left truncate" x-text="cat.label"></span>
              <span class="text-webropol-gray-400 font-normal normal-case" x-text="cat.components.filter(c=>c.visible).length"></span>
              <i class="fal text-webropol-gray-300 transition-transform duration-200"
                 :class="expandedCategories[cat.id] ? 'fa-chevron-down' : 'fa-chevron-right'"
                 style="font-size:10px"></i>
            </button>

            <!-- Component items (expand/collapse) -->
            <div :class="expandedCategories[cat.id] ? 'open' : ''" class="cat-items">
              <div class="ml-3 pl-3 border-l border-webropol-gray-200 mt-0.5 pb-1 space-y-0.5">
                <template x-for="comp in cat.components.filter(c => c.visible)" :key="comp.name">
                  <button
                    @click="comp.demoUrl ? selectDemo(comp.demoUrl, comp.name, cat) : null"
                    :disabled="!comp.demoUrl"
                    :class="{
                      'sidebar-item-active border': selectedComp === comp.name,
                      'text-webropol-gray-600 hover:bg-webropol-gray-100 border border-transparent': selectedComp !== comp.name && comp.demoUrl,
                      'text-webropol-gray-300 cursor-not-allowed border border-transparent': !comp.demoUrl
                    }"
                    class="w-full flex items-center gap-2 px-2.5 py-1.5 rounded-lg text-xs transition-colors text-left cursor-pointer">
                    <span class="w-1.5 h-1.5 rounded-full shrink-0 mt-px"
                          :class="comp.demoUrl ? 'bg-green-400' : 'bg-webropol-gray-200'"></span>
                    <span class="truncate flex-1" x-text="comp.name"></span>
                    <i x-show="!comp.demoUrl" class="fal fa-lock text-webropol-gray-200 text-xs shrink-0"></i>
                  </button>
                </template>
              </div>
            </div>

          </div>
        </template>

        <!-- Empty search state -->
        <div x-show="visibleCount === 0" class="py-10 text-center">
          <i class="fal fa-search text-2xl text-webropol-gray-300 mb-2 block"></i>
          <p class="text-xs text-webropol-gray-400 mb-2">No matches</p>
          <button @click="search=''; demoFilter='all'; filterComponents()" class="text-xs text-webropol-primary-600 hover:underline">Clear filters</button>
        </div>

      </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 overflow-hidden flex flex-col">

      <!-- OVERVIEW (no demo selected) -->
      <div x-show="!selectedDemo" class="flex-1 overflow-y-auto">
        <div class="p-8 max-w-6xl mx-auto">

          <!-- Stats -->
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
            <template x-for="stat in stats" :key="stat.label">
              <div class="bg-white rounded-2xl p-5 border border-webropol-gray-200 shadow-sm">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 rounded-xl flex items-center justify-center" :class="stat.bg">
                    <i :class="'fal ' + stat.icon + ' ' + stat.color + ' text-lg'"></i>
                  </div>
                  <div>
                    <div class="text-2xl font-bold text-webropol-gray-900" x-text="stat.value"></div>
                    <div class="text-xs text-webropol-gray-500" x-text="stat.label"></div>
                  </div>
                </div>
              </div>
            </template>
          </div>

          <!-- Category summary cards -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            <template x-for="cat in filteredCategories.filter(c => c.visible)" :key="cat.id">
              <div class="bg-white rounded-2xl border border-webropol-gray-200 shadow-sm overflow-hidden flex flex-col">

                <!-- Card header -->
                <div class="p-5 border-b border-webropol-gray-100">
                  <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-sm" :class="cat.bg">
                      <i :class="'fal ' + cat.icon + ' ' + cat.iconColor + ' text-base'"></i>
                    </div>
                    <div>
                      <h3 class="font-semibold text-sm text-webropol-gray-900" x-text="cat.label"></h3>
                      <p class="text-xs text-webropol-gray-400">
                        <span x-text="cat.components.filter(c=>c.visible && c.demoUrl).length"></span> demos /
                        <span x-text="cat.components.filter(c=>c.visible).length"></span> total
                      </p>
                    </div>
                  </div>
                  <p class="text-xs text-webropol-gray-500 leading-relaxed" x-text="cat.description"></p>
                </div>

                <!-- Component list -->
                <div class="px-4 py-3 space-y-1 flex-1">
                  <template x-for="comp in cat.components.filter(c => c.visible)" :key="comp.name">
                    <button
                      @click="comp.demoUrl ? selectDemo(comp.demoUrl, comp.name, cat) : null"
                      :disabled="!comp.demoUrl"
                      :class="comp.demoUrl
                        ? 'hover:bg-webropol-primary-50 hover:text-webropol-primary-700 text-webropol-gray-600 cursor-pointer'
                        : 'text-webropol-gray-300 cursor-not-allowed'"
                      class="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg text-xs transition-colors text-left">
                      <span class="w-1.5 h-1.5 rounded-full shrink-0"
                            :class="comp.demoUrl ? 'bg-green-400' : 'bg-webropol-gray-200'"></span>
                      <span class="truncate flex-1" x-text="comp.name"></span>
                      <i x-show="comp.demoUrl" class="fal fa-arrow-right text-webropol-gray-300 text-xs"></i>
                      <i x-show="!comp.demoUrl" class="fal fa-lock text-webropol-gray-200 text-xs"></i>
                    </button>
                  </template>
                </div>

              </div>
            </template>
          </div>

          <!-- No results -->
          <div x-show="visibleCount === 0" class="text-center py-20">
            <i class="fal fa-search text-4xl text-webropol-gray-300 mb-4 block"></i>
            <p class="text-webropol-gray-500 font-medium">No components match your search</p>
            <button @click="search=''; demoFilter='all'; filterComponents()" class="mt-3 text-webropol-primary-600 text-sm hover:underline">Clear filters</button>
          </div>

        </div>
      </div>

      <!-- DEMO IFRAME VIEW -->
      <div x-show="selectedDemo" class="flex-1 flex flex-col overflow-hidden">

        <!-- Toolbar -->
        <div class="bg-white border-b border-webropol-gray-200 px-4 h-10 flex items-center gap-2 shrink-0">
          <button @click="selectOverview()"
                  class="flex items-center gap-1.5 text-webropol-gray-500 hover:text-webropol-gray-700 transition-colors text-xs px-2 py-1 rounded-lg hover:bg-webropol-gray-100">
            <i class="fal fa-layout-grid"></i>
            <span>Overview</span>
          </button>

          <i class="fal fa-chevron-right text-webropol-gray-300 text-xs"></i>
          <span class="text-xs text-webropol-gray-500" x-text="selectedCat ? selectedCat.label : ''"></span>

          <template x-if="selectedComp">
            <span class="flex items-center gap-1.5">
              <i class="fal fa-chevron-right text-webropol-gray-300 text-xs"></i>
              <span class="text-xs font-medium text-webropol-gray-800" x-text="selectedComp"></span>
            </span>
          </template>

          <div class="flex-1"></div>

          <button @click="reloadFrame()"
                  class="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs text-webropol-gray-500 hover:bg-webropol-gray-100 transition-colors"
                  title="Reload">
            <i class="fal fa-rotate-right text-xs"></i>
          </button>

          <a :href="selectedDemo" target="_blank"
             class="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs text-webropol-primary-600 hover:bg-webropol-primary-50 transition-colors font-medium">
            <i class="fal fa-external-link text-xs"></i>
            Open in tab
          </a>
        </div>

        <!-- Loading bar -->
        <div x-show="iframeLoading" class="h-0.5 shrink-0 shimmer"></div>

        <!-- Iframe -->
        <iframe
          x-ref="demoFrame"
          :src="selectedDemo"
          @load="iframeLoading = false"
          class="flex-1 w-full border-0 bg-white"
          title="Component demo"></iframe>

      </div>

    </div><!-- /main -->

  </div><!-- /layout -->

  <script>
    function libraryApp() {
      return {
        search: '',
        demoFilter: 'all',
        visibleCount: 0,
        selectedDemo: null,
        selectedComp: null,
        selectedCat: null,
        iframeLoading: false,
        expandedCategories: {},

        categories: [
          {
            id: 'atoms', label: 'Atoms',
            description: 'Foundational design tokens: colours, typography, spacing, and shadows',
            icon: 'fa-atom', iconColor: 'text-orange-600', bg: 'bg-orange-50',
            badgeClass: 'bg-orange-100 text-orange-700', visible: true,
            components: [
              { name: 'Color Palette', description: 'All Webropol colour tokens across neutral, primary, accent, success, warning, error, and royal scales. Full 11-step swatches with hex values.', tags: ['CSS vars', 'Tailwind', 'color tokens', 'palette'], demoUrl: 'demos/colors-demo.html', visible: true },
              { name: 'Typography', description: 'Inter type scale from Display to Caption. Font weights, line heights, and Tailwind utility reference.', tags: ['font', 'typeface', 'text', 'Inter', 'heading', 'body'], demoUrl: 'demos/typography-demo.html', visible: true }
            ]
          },
          {
            id: 'buttons', label: 'Buttons',
            description: 'Interactive button variants, links, and hue controls',
            icon: 'fa-hand-pointer', iconColor: 'text-webropol-primary-600', bg: 'bg-webropol-primary-50',
            badgeClass: 'bg-webropol-primary-100 text-webropol-primary-700', visible: true,
            components: [
              { name: 'Button', description: 'Primary interactive button with 9 variants, sizes, icons, and states.', tags: ['webropol-button'], demoUrl: 'demos/buttons-demo.html', visible: true },
              { name: 'ButtonHue', description: 'Hue-selection button for colour pickers and palette controls.', tags: ['webropol-button-hue'], demoUrl: 'demos/button-hue-demo.html', visible: true },
              { name: 'TextLink', description: 'Inline text link component with underline and icon support.', tags: ['webropol-text-link'], demoUrl: null, visible: true }
            ]
          },
          {
            id: 'cards', label: 'Cards',
            description: 'Card containers for content, actions, media, and lists',
            icon: 'fa-rectangle-landscape', iconColor: 'text-webropol-royalBlue-600', bg: 'bg-indigo-50',
            badgeClass: 'bg-indigo-100 text-indigo-700', visible: true,
            components: [
              { name: 'Card', description: 'Base card with default, elevated, and gradient variants.', tags: ['webropol-card'], demoUrl: 'demos/card-demo.html', visible: true },
              { name: 'ActionCard', description: 'Event/workshop card with badge, title, description, and action slot.', tags: ['webropol-action-card'], demoUrl: 'demos/action-card-demo.html', visible: true },
              { name: 'ListCard', description: 'Card containing an ordered list with status badges and action links.', tags: ['webropol-list-card'], demoUrl: 'demos/list-card-demo.html', visible: true },
              { name: 'VideoCard', description: 'Media card with thumbnail, play button overlay, and duration badge.', tags: ['webropol-video-card'], demoUrl: 'demos/video-card-demo.html', visible: true },
              { name: 'ThumbnailCard', description: 'Selectable thumbnail card for template/image pickers.', tags: ['webropol-thumbnail-card'], demoUrl: 'demos/thumbnail-card-demo.html', visible: true },
              { name: 'ConfigurableCard', description: 'Flexible card with configurable header, body, and footer slots.', tags: ['webropol-configurable-card'], demoUrl: 'demos/configurable-card-demo.html', visible: true },
              { name: 'CardLegacy', description: 'Legacy card component kept for backward compatibility.', tags: ['webropol-card-legacy'], demoUrl: null, visible: true }
            ]
          },
          {
            id: 'forms', label: 'Forms',
            description: 'Input controls, selectors, toggles, and form elements',
            icon: 'fa-input-text', iconColor: 'text-webropol-success-600', bg: 'bg-green-50',
            badgeClass: 'bg-green-100 text-green-700', visible: true,
            components: [
              { name: 'Input', description: 'Text input with label, placeholder, icon, helper text, and error state.', tags: ['webropol-input'], demoUrl: 'demos/input-demo.html', visible: true },
              { name: 'Checkbox', description: 'Styled checkbox with label, checked, disabled, and indeterminate states.', tags: ['webropol-checkbox'], demoUrl: 'demos/checkbox-demo.html', visible: true },
              { name: 'Toggle', description: 'Toggle switch for boolean settings with label and description.', tags: ['webropol-toggle'], demoUrl: 'demos/toggle-demo.html', visible: true },
              { name: 'Dropdown', description: 'Custom styled dropdown with label, placeholder, and JSON options array.', tags: ['webropol-dropdown'], demoUrl: 'demos/dropdown-demo.html', visible: true },
              { name: 'RadioPill', description: 'Pill-style radio group for mutually exclusive selections.', tags: ['webropol-radio-pill'], demoUrl: 'demos/forms-demo.html', visible: true },
              { name: 'RadioSpecial', description: 'Large selectable radio card with icon, title, and description.', tags: ['webropol-radio-special'], demoUrl: 'demos/radio-demo.html', visible: true }
            ]
          },
          {
            id: 'feedback', label: 'Feedback',
            description: 'Alerts, banners, badges, toasts, loading states, and context surfaces',
            icon: 'fa-bell', iconColor: 'text-webropol-warning-600', bg: 'bg-amber-50',
            badgeClass: 'bg-amber-100 text-amber-700', visible: true,
            components: [
              { name: 'SmartNotifier', description: 'Unified Figma-aligned notifier with semantic and royal variants, dismiss, and CTA actions.', tags: ['webropol-smart-notifier'], demoUrl: 'demos/smart-notifier-demo.html', visible: true },
              { name: 'Alert', description: 'Inline alert banner with icon and dismissible support.', tags: ['webropol-alert-info'], demoUrl: 'demos/alert-demo.html', visible: true },
              { name: 'Banner', description: 'Page-level notification banner with heading, icon, and actions.', tags: ['webropol-banner'], demoUrl: 'demos/banner-demo.html', visible: true },
              { name: 'Badge', description: 'Status badge/pill with primary, success, warning, and error variants.', tags: ['webropol-badge'], demoUrl: 'demos/badge-demo.html', visible: true },
              { name: 'Loading', description: 'Loading indicator in four styles: spinner, dots, pulse, and bars.', tags: ['webropol-loading'], demoUrl: 'demos/loading-demo.html', visible: true },
              { name: 'Toast', description: 'Floating notification toast with variants and auto-dismiss.', tags: ['webropol-toast'], demoUrl: 'demos/toast-demo.html', visible: true },
              { name: 'Tooltip & Popover', description: 'Read-only hints and interactive context panels documented together as one context-surface family.', tags: ['webropol-tooltip', 'webropol-popover'], demoUrl: 'demos/tooltip-demo.html', visible: true },
              { name: 'PromoToast', description: 'Promotional floating notification for feature announcements.', tags: ['webropol-promo-toast'], demoUrl: 'demos/feedback-demo.html', visible: true }
            ]
          },
          {
            id: 'animation', label: 'Animation',
            description: 'Motion-led illustration components for AI states and expressive system feedback',
            icon: 'fa-stars', iconColor: 'text-webropol-royalViolet-600', bg: 'bg-violet-50',
            badgeClass: 'bg-violet-100 text-violet-700', visible: true,
            components: [
              { name: 'CatInCup', description: 'Animated sleepy cat-in-a-cup illustration for AI summary waiting and retry states.', tags: ['webropol-cat-in-cup', 'animation', 'ai-state'], demoUrl: 'demos/cat-in-cup-demo.html', visible: true }
            ]
          },
          {
            id: 'navigation', label: 'Navigation',
            description: 'Sidebar, header, breadcrumbs, tabs, and toolbars',
            icon: 'fa-compass', iconColor: 'text-webropol-royalViolet-600', bg: 'bg-purple-50',
            badgeClass: 'bg-purple-100 text-purple-700', visible: true,
            components: [
              { name: 'SidebarEnhanced', description: 'Full application sidebar with collapsible navigation and active state.', tags: ['webropol-sidebar'], demoUrl: 'demos/navigation-demo.html', visible: true },
              { name: 'Header', description: 'App top header with notifications, help, user menu, and theme selector.', tags: ['webropol-header'], demoUrl: 'demos/navigation-demo.html', visible: true },
              { name: 'Breadcrumbs', description: 'Breadcrumb trail with JSON trail array and responsive overflow.', tags: ['webropol-breadcrumbs'], demoUrl: 'demos/breadcrumbs-demo.html', visible: true },
              { name: 'Brand', description: 'Webropol brand logo component with simple/full mode.', tags: ['webropol-brand'], demoUrl: 'demos/brand-demo.html', visible: true },
              { name: 'Tabs', description: 'Tab navigation with primary, pills, and underline variants.', tags: ['webropol-tabs'], demoUrl: 'demos/tabs-demo.html', visible: true },

        get filteredCategories() {
          return this.categories;
        },

        get stats() {
          const total    = this.categories.flatMap(c => c.components).length;
          const withDemo = this.categories.flatMap(c => c.components).filter(c => c.demoUrl).length;
          const noDemo   = total - withDemo;
          const cats     = this.categories.length;
          return [
            { label: 'Total components', value: total,    icon: 'fa-cube',         bg: 'bg-webropol-primary-50', color: 'text-webropol-primary-600' },
            { label: 'With demo pages',  value: withDemo, icon: 'fa-check-circle', bg: 'bg-green-50',           color: 'text-green-600' },
            { label: 'No demo yet',      value: noDemo,   icon: 'fa-clock',        bg: 'bg-amber-50',           color: 'text-amber-600' },
            { label: 'Categories',       value: cats,     icon: 'fa-layer-group',  bg: 'bg-purple-50',          color: 'text-purple-600' }
          ];
        },

        init() {
          this.categories.forEach(cat => {
            this.expandedCategories[cat.id] = true;
          });
          // Auto-open atoms on first load
          this.expandedCategories['atoms'] = true;
          this.filterComponents();

          // Restore state from URL hash on load (e.g. #cards/Card)
          this.applyRouteFromHash();

          // Update view when user navigates back/forward or hash changes
          window.addEventListener('hashchange', () => this.applyRouteFromHash());
        },

        // Hash format: #<categoryId>/<ComponentName>  (component is optional)
        applyRouteFromHash() {
          const hash = (location.hash || '').replace(/^#\/?/, '').trim();
          if (!hash) {
            // No hash => overview
            this.selectedDemo = null;
            this.selectedComp = null;
            this.selectedCat  = null;
            return;
          }
          const [catId, ...rest] = hash.split('/');
          const compName = decodeURIComponent(rest.join('/') || '');
          const cat = this.categories.find(c => c.id === catId);
          if (!cat) return;
          this.expandedCategories[cat.id] = true;
          if (!compName) {
            this.selectedDemo = null;
            this.selectedComp = null;
            this.selectedCat  = cat;
            return;
          }
          const comp = cat.components.find(c => c.name === compName);
          if (!comp) return;
          this.selectedDemo  = comp.demoUrl || null;
          this.selectedComp  = comp.name;
          this.selectedCat   = cat;
          this.iframeLoading = !!comp.demoUrl;
        },

        updateHash() {
          let next = '';
          if (this.selectedComp && this.selectedCat) {
            next = `#${this.selectedCat.id}/${encodeURIComponent(this.selectedComp)}`;
          } else if (this.selectedCat) {
            next = `#${this.selectedCat.id}`;
          }
          // Use replaceState to avoid spamming history while clicking around
          if (next !== location.hash) {
            history.replaceState(null, '', next || location.pathname + location.search);
          }
        },

        selectDemo(url, compName, cat) {
          this.selectedDemo  = url;
          this.selectedComp  = compName;
          this.selectedCat   = cat || null;
          this.iframeLoading = !!url;
          if (cat) this.expandedCategories[cat.id] = true;
          this.updateHash();
        },

        selectOverview() {
          this.selectedDemo = null;
          this.selectedComp = null;
          this.selectedCat  = null;
          this.updateHash();
        },

        toggleCategory(id) {
          this.expandedCategories[id] = !this.expandedCategories[id];
        },

        reloadFrame() {
          const frame = this.$refs.demoFrame;
          if (frame) {
            this.iframeLoading = true;
            frame.src = frame.src;
          }
        },

        filterComponents() {
          const q = this.search.toLowerCase().trim();
          let count = 0;
          this.categories.forEach(cat => {
            cat.components.forEach(comp => {
              const matchesSearch = !q ||
                comp.name.toLowerCase().includes(q) ||
                comp.description.toLowerCase().includes(q) ||
                (comp.tags || []).some(t => t.toLowerCase().includes(q)) ||
                cat.label.toLowerCase().includes(q);
              const matchesFilter =
                this.demoFilter === 'all' ||
                (this.demoFilter === 'demo'   && comp.demoUrl) ||
                (this.demoFilter === 'nodemo' && !comp.demoUrl);
              comp.visible = matchesSearch && matchesFilter;
              if (comp.visible) count++;
            });
            cat.visible = cat.components.some(c => c.visible);
            if (q && cat.visible) this.expandedCategories[cat.id] = true;
          });
          this.visibleCount = count;
        }
      };
    }
