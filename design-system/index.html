<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Library — Webropol Design System</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'webropol-primary': {
              50: '#eefbfd', 100: '#d5f4f8', 200: '#b0e8f1', 300: '#79d6e7',
              400: '#3fbcd5', 500: '#209fba', 600: '#1d809d', 700: '#1e6880',
              800: '#215669', 900: '#204859', 950: '#102e3c'
            },
            'webropol-gray': {
              50: '#f9fafa', 100: '#f3f4f4', 200: '#e6e7e8', 300: '#d1d5d6',
              400: '#b5bbbd', 500: '#9ba2a4', 600: '#787f81', 700: '#61686a',
              800: '#515557', 900: '#45484a', 950: '#272a2b'
            },
            'webropol-royalViolet': {
              500: '#823bdd', 600: '#6922c4', 700: '#511a98'
            },
            'webropol-royalBlue': {
              500: '#6366f1', 600: '#4f46e5', 700: '#4338ca'
            },
            'webropol-royalTurquoise': {
              500: '#06b6d4', 600: '#0891b2', 700: '#0e7490'
            },
            'webropol-success': {
              500: '#579f48', 600: '#448237'
            },
            'webropol-warning': {
              500: '#f5980b', 600: '#d97106'
            },
            'webropol-danger': {
              500: '#f43f63', 600: '#e11d4e'
            }
          },
          fontFamily: { 'sans': ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    [x-cloak] { display: none !important; }

    .component-card {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .component-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px -6px rgba(0,0,0,0.12);
    }

    .category-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .has-demo {
      --demo-dot: #22c55e;
    }
    .no-demo {
      --demo-dot: #f59e0b;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background-color: var(--demo-dot);
    }

    .search-clear {
      cursor: pointer;
    }

    .sticky-header {
      position: sticky; top: 0; z-index: 40;
      backdrop-filter: blur(12px);
      background: rgba(249, 250, 250, 0.92);
      border-bottom: 1px solid #e6e7e8;
    }

    .anchor-nav a {
      transition: color 0.1s, background 0.1s;
    }
    .anchor-nav a:hover, .anchor-nav a.active {
      color: #1d809d;
      background: #d5f4f8;
    }
  </style>
</head>

<body class="bg-webropol-gray-50 min-h-screen font-sans" x-data="libraryApp()" x-init="init()">

  <!-- ── Sticky Header ── -->
  <div class="sticky-header px-6 py-3">
    <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <a href="index.html" class="text-webropol-primary-700 hover:text-webropol-primary-600 transition-colors shrink-0">
          <i class="fal fa-arrow-left text-sm"></i>
        </a>
        <div class="w-px h-4 bg-webropol-gray-300 shrink-0"></div>
        <h1 class="text-base font-semibold text-webropol-gray-900 truncate">Component Library</h1>
        <span class="hidden sm:inline-flex items-center gap-1 px-2 py-0.5 bg-webropol-primary-100 text-webropol-primary-700 rounded-full text-xs font-semibold">
          <span x-text="visibleCount"></span> components
        </span>
      </div>

      <!-- Search -->
      <div class="relative flex-1 max-w-sm">
        <i class="fal fa-search absolute left-3 top-1/2 -translate-y-1/2 text-webropol-gray-400 text-sm pointer-events-none"></i>
        <input
          type="text"
          x-model="search"
          @input="filterComponents()"
          placeholder="Search components…"
          class="w-full pl-9 pr-8 py-2 text-sm bg-white border border-webropol-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-webropol-primary-300 focus:border-webropol-primary-400 placeholder-webropol-gray-400"
        >
        <button x-show="search" @click="search=''; filterComponents()" class="search-clear absolute right-3 top-1/2 -translate-y-1/2 text-webropol-gray-400 hover:text-webropol-gray-600">
          <i class="fal fa-times text-xs"></i>
        </button>
      </div>

      <!-- Filter pills -->
      <div class="hidden md:flex items-center gap-2">
        <button
          @click="demoFilter='all'; filterComponents()"
          :class="demoFilter==='all' ? 'bg-webropol-gray-900 text-white' : 'bg-white text-webropol-gray-600 border border-webropol-gray-200 hover:bg-webropol-gray-100'"
          class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">
          All
        </button>
        <button
          @click="demoFilter='demo'; filterComponents()"
          :class="demoFilter==='demo' ? 'bg-green-600 text-white' : 'bg-white text-webropol-gray-600 border border-webropol-gray-200 hover:bg-webropol-gray-100'"
          class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">
          Has Demo
        </button>
        <button
          @click="demoFilter='nodemo'; filterComponents()"
          :class="demoFilter==='nodemo' ? 'bg-amber-500 text-white' : 'bg-white text-webropol-gray-600 border border-webropol-gray-200 hover:bg-webropol-gray-100'"
          class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">
          No Demo
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-10">

    <!-- Hero Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
      <template x-for="stat in stats" :key="stat.label">
        <div class="bg-white rounded-2xl p-5 border border-webropol-gray-200 shadow-sm">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center" :class="stat.bg">
              <i :class="'fal ' + stat.icon + ' ' + stat.color + ' text-lg'"></i>
            </div>
            <div>
              <div class="text-2xl font-bold text-webropol-gray-900" x-text="stat.value"></div>
              <div class="text-xs text-webropol-gray-500" x-text="stat.label"></div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- No results -->
    <div x-show="visibleCount === 0" class="text-center py-20">
      <i class="fal fa-search text-4xl text-webropol-gray-300 mb-3"></i>
      <p class="text-webropol-gray-500 font-medium">No components match your search</p>
      <button @click="search=''; demoFilter='all'; filterComponents()" class="mt-3 text-webropol-primary-600 text-sm hover:underline">Clear filters</button>
    </div>

    <!-- Categories -->
    <template x-for="category in filteredCategories" :key="category.id">
      <section :id="'cat-' + category.id" class="mb-14" x-show="category.visible">
        <!-- Category header -->
        <div class="flex items-center gap-4 mb-5">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-sm" :class="category.bg">
            <i :class="'fal ' + category.icon + ' ' + category.iconColor + ' text-lg'"></i>
          </div>
          <div>
            <h2 class="text-xl font-bold text-webropol-gray-900" x-text="category.label"></h2>
            <p class="text-sm text-webropol-gray-500" x-text="category.description"></p>
          </div>
          <div class="ml-auto flex items-center gap-3">
            <span class="text-xs text-webropol-gray-400 font-medium">
              <span x-text="category.components.filter(c=>c.visible).length"></span> components
            </span>
          </div>
        </div>

        <!-- Component grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          <template x-for="comp in category.components.filter(c=>c.visible)" :key="comp.name">
            <div class="component-card bg-white rounded-2xl border border-webropol-gray-200 shadow-sm overflow-hidden flex flex-col"
                 :class="comp.demoUrl ? 'has-demo' : 'no-demo'">
              <!-- Card Header -->
              <div class="p-5 flex-1">
                <div class="flex items-start justify-between mb-3">
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center" :class="category.bg">
                      <i :class="'fal ' + (comp.icon || category.icon) + ' ' + category.iconColor + ' text-sm'"></i>
                    </div>
                    <div class="status-dot shrink-0"></div>
                  </div>
                  <span class="category-badge px-2 py-0.5 rounded-full" :class="category.badgeClass" x-text="category.id"></span>
                </div>
                <h3 class="font-semibold text-webropol-gray-900 mb-1" x-text="comp.name"></h3>
                <p class="text-xs text-webropol-gray-500 leading-relaxed" x-text="comp.description"></p>

                <!-- Tags -->
                <div class="flex flex-wrap gap-1 mt-3" x-show="comp.tags && comp.tags.length">
                  <template x-for="tag in (comp.tags || [])">
                    <span class="text-xs px-1.5 py-0.5 bg-webropol-gray-100 text-webropol-gray-500 rounded font-mono" x-text="tag"></span>
                  </template>
                </div>
              </div>

              <!-- Card Footer -->
              <div class="border-t border-webropol-gray-100 px-5 py-3 flex items-center justify-between bg-webropol-gray-50">
                <span class="text-xs" :class="comp.demoUrl ? 'text-green-600 font-medium' : 'text-amber-600 font-medium'">
                  <i :class="comp.demoUrl ? 'fal fa-check-circle' : 'fal fa-clock'" class="mr-1"></i>
                  <span x-text="comp.demoUrl ? 'Demo ready' : 'No demo yet'"></span>
                </span>
                <template x-if="comp.demoUrl">
                  <a :href="comp.demoUrl"
                     class="inline-flex items-center gap-1 px-3 py-1.5 bg-webropol-primary-600 hover:bg-webropol-primary-700 text-white text-xs font-medium rounded-lg transition-colors">
                    View Demo <i class="fal fa-external-link text-xs"></i>
                  </a>
                </template>
                <template x-if="!comp.demoUrl">
                  <span class="inline-flex items-center gap-1 px-3 py-1.5 bg-webropol-gray-100 text-webropol-gray-400 text-xs font-medium rounded-lg cursor-not-allowed">
                    Coming soon
                  </span>
                </template>
              </div>
            </div>
          </template>
        </div>
      </section>
    </template>

  </div>

  <!-- ── Footer ── -->
  <footer class="border-t border-webropol-gray-200 bg-white py-6 text-center text-webropol-gray-400 text-sm">
    Webropol Design System — Component Library
    &nbsp;·&nbsp;
    <a href="index.html" class="text-webropol-primary-600 hover:underline">Back to Showcase</a>
    &nbsp;·&nbsp;
    <a href="demos/colors-demo.html" class="text-webropol-primary-600 hover:underline">Color Tokens</a>
  </footer>

        get filteredCategories() {
          return this.categories;
        },

        get stats() {
          const total = this.categories.flatMap(c => c.components).length;
          const withDemo = this.categories.flatMap(c => c.components).filter(c => c.demoUrl).length;
          const noDemo = total - withDemo;
          const cats = this.categories.length;
          return [
            { label: 'Total components', value: total, icon: 'fa-cube', bg: 'bg-webropol-primary-50', color: 'text-webropol-primary-600' },
            { label: 'With demo pages', value: withDemo, icon: 'fa-check-circle', bg: 'bg-green-50', color: 'text-green-600' },
            { label: 'No demo yet', value: noDemo, icon: 'fa-clock', bg: 'bg-amber-50', color: 'text-amber-600' },
            { label: 'Categories', value: cats, icon: 'fa-layer-group', bg: 'bg-purple-50', color: 'text-purple-600' }
          ];
        },

        init() {
          this.filterComponents();
        },

        filterComponents() {
          const q = this.search.toLowerCase().trim();
          let count = 0;
          this.categories.forEach(cat => {
            cat.components.forEach(comp => {
              const matchesSearch = !q ||
                comp.name.toLowerCase().includes(q) ||
                comp.description.toLowerCase().includes(q) ||
                (comp.tags || []).some(t => t.toLowerCase().includes(q)) ||
                cat.label.toLowerCase().includes(q);
              const matchesFilter =
                this.demoFilter === 'all' ||
                (this.demoFilter === 'demo' && comp.demoUrl) ||
                (this.demoFilter === 'nodemo' && !comp.demoUrl);
              comp.visible = matchesSearch && matchesFilter;
              if (comp.visible) count++;
            });
            cat.visible = cat.components.some(c => c.visible);
          });
          this.visibleCount = count;
        }
      };
    }
