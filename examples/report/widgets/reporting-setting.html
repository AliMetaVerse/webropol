<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporting UX Context Bar | Webropol</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'webropol-primary': { 50: '#f0fdff', 100: '#ccf7fe', 200: '#99effd', 300: '#66e0fa', 400: '#22ccf1', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63' },
            'webropol-gray': { 50: '#f8fafc', 500: '#64748b', 600: '#475569', 900: '#0f172a' },
            'webropol-sidebar': '#323a45',
          },
          fontFamily: { 'sans': ['Inter', 'system-ui', 'sans-serif'] },
           boxShadow: {
            'card': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
            'float': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
             'selected': '0 0 0 2px #06b6d4, 0 4px 12px rgba(6, 182, 212, 0.2)',
          }
        }
      }
    }
  </script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../../../design-system/styles/tokens.css" rel="stylesheet">

  <style>
      body { background-color: #f3f4f6; }
      
      /* Smooth transitions for toolbar items */
      .toolbar-item {
          transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .toolbar-enter {
          animation: slideInRight 0.3s cubic-bezier(0.2, 0, 0.2, 1) forwards;
      }
      .toolbar-leave {
          display: none; 
      }
      
      @keyframes slideInRight {
          from { opacity: 0; transform: translateX(10px); }
          to { opacity: 1; transform: translateX(0); }
      }

       /* ── Widget / Zone selection styles (web component versions) ── */
      webropol-report-widget {
          display: block;
          transition: all 0.2s ease;
          border: 2px solid transparent;
      }
      webropol-report-widget:hover { border-color: #e2e8f0; }
      webropol-report-widget.selected {
          border-color: #94a3b8;
          background-color: #ffffff;
          box-shadow: 0 25px 50px -12px rgba(0,0,0,.25);
          transform: translateY(-8px);
          z-index: 40;
      }

      webropol-report-chart,
      webropol-report-table {
          display: block;
          transition: all 0.2s;
          border: 2px dashed transparent;
          border-radius: 8px;
      }
      webropol-report-chart:hover  { background: #f8fafc; border-color: #e2e8f0; }
      webropol-report-table:hover  { background: #f8fafc; border-color: #e2e8f0; }
      webropol-report-chart.selected {
          border-color: #60a5fa;
          background-color: rgba(59,130,246,.02);
          box-shadow: 0 0 0 2px rgba(59,130,246,.1);
      }
      webropol-report-table.selected {
          border-color: #4ade80;
          background-color: rgba(74,222,128,.02);
          box-shadow: 0 0 0 2px rgba(74,222,128,.1);
      }

      [x-cloak] { display: none !important; }
  </style>

  <script src="../../../design-system/components/navigation/Sidebar.js" type="module"></script>
  <script src="../../../design-system/components/navigation/Header.js" type="module"></script>
  <script src="../../../design-system/components/navigation/SurveyActionTabs.js" type="module"></script>

  <!-- Report widget design system components -->
  <script src="../../../design-system/components/report/ReportWidget.js" type="module"></script>
  <script src="../../../design-system/components/report/ReportChart.js" type="module"></script>
  <script src="../../../design-system/components/report/ReportTable.js" type="module"></script>
  <script src="../../../design-system/components/report/ReportIntroModal.js" type="module"></script>
</head>
<body x-data="contextApp()" class="h-screen flex text-slate-800">
    
    <webropol-sidebar active="surveys" base="../../../"></webropol-sidebar>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <webropol-header-enhanced username="Ali Al-Zuhairi"></webropol-header-enhanced>
        
        <main class="flex-1 flex flex-col overflow-y-auto relative" @click="handleClickBackground($event)">
            <!-- ── Sticky header + dynamic toolbar ── -->
            <div class="sticky top-0 z-30 bg-white border-b border-gray-200 shadow-sm px-6 py-3">
                <div class="w-full max-w-[1600px] mx-auto space-y-3">

                    <!-- Row 1: Survey tabs -->
                    <div class="flex items-center justify-between border-b border-gray-200 pb-2">
                        <webropol-survey-action-tabs active="report"></webropol-survey-action-tabs>
                        <div class="text-sm font-semibold text-gray-700">Survey: AI Text Analysis Survey</div>
                    </div>

                    <!-- Row 2: Context toolbar -->
                    <div class="h-14 bg-white rounded-xl border border-gray-200 px-4 flex items-center justify-between">

                        <!-- Left: Report selector + save -->
                        <div class="flex items-center gap-3">
                            <div class="relative" x-data="{ open: false }" @click.away="open = false">
                                <button @click="open = !open"
                                        class="flex items-center gap-2 px-3 py-2 bg-gray-50 hover:bg-gray-100 rounded-lg border border-gray-200 text-sm font-semibold text-gray-700 transition-colors">
                                    <span class="text-xs font-bold text-orange-600">(Edited)</span>
                                    <span>Basic report</span>
                                    <i class="fal fa-chevron-down text-xs"></i>
                                </button>
                            </div>
                            <div class="h-8 w-px bg-gray-200"></div>
                            <div class="flex gap-2">
                                <button class="px-3 py-1.5 text-sm font-medium bg-gray-100 text-gray-600 rounded hover:bg-gray-200 transition-colors"><i class="fal fa-save mr-1"></i> Save</button>
                                <button class="px-3 py-1.5 text-sm font-medium border border-gray-300 text-gray-600 rounded hover:bg-gray-50 transition-colors"><i class="fal fa-pen mr-1"></i> Save as</button>
                            </div>
                        </div>

                        <!-- Right: Global report actions -->
                        <div class="flex items-center gap-5 text-gray-600">
                            <button class="flex flex-col items-center gap-0.5 hover:text-webropol-primary-600 group">
                                <i class="fal fa-filter text-lg group-hover:scale-110 transition-transform"></i>
                                <span class="text-[10px] font-medium">Filter</span>
                            </button>
                            <button class="flex flex-col items-center gap-0.5 hover:text-webropol-primary-600 group">
                                <i class="fal fa-chart-bar text-lg group-hover:scale-110 transition-transform"></i>
                                <span class="text-[10px] font-medium">Compare</span>
                            </button>
                            <button class="flex flex-col items-center gap-0.5 hover:text-webropol-primary-600 group">
                                <i class="fal fa-users text-lg group-hover:scale-110 transition-transform"></i>
                                <span class="text-[10px] font-medium">Respondents</span>
                            </button>
                            <button class="flex flex-col items-center gap-0.5 hover:text-webropol-primary-600 group">
                                <i class="fal fa-palette text-lg group-hover:scale-110 transition-transform"></i>
                                <span class="text-[10px] font-medium">Layout</span>
                            </button>
                            <button class="flex flex-col items-center gap-0.5 hover:text-webropol-primary-600 group">
                                <i class="fal fa-plus-square text-lg group-hover:scale-110 transition-transform"></i>
                                <span class="text-[10px] font-medium">Add Elements</span>
                            </button>
                            <button class="flex flex-col items-center gap-0.5 hover:text-webropol-primary-600 group">
                                <i class="fal fa-chart-line text-lg group-hover:scale-110 transition-transform"></i>
                                <span class="text-[10px] font-medium">Analytics</span>
                            </button>
                            <div class="h-10 w-px bg-gray-200"></div>
                            <button class="flex flex-col items-center gap-0.5 text-red-700 hover:text-red-800 group">
                                <i class="fal fa-share-square text-lg group-hover:scale-110 transition-transform"></i>
                                <span class="text-[10px] font-bold">Export &amp; Share</span>
                            </button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Content Container (Row) -->
            <div class="flex flex-1 overflow-hidden" style="max-width: 1920px; margin: 0 auto; width: 100%;">
                
                <!-- NEW: Question Navigator Sidebar -->
                <div class="w-72 bg-gray-50/50 border-r border-gray-200 flex-shrink-0 flex flex-col h-full overflow-y-auto hidden lg:flex custom-scrollbar">
                    <div class="p-3 border-b border-gray-200 sticky top-0 bg-gray-50/95 backdrop-blur z-10">
                        <div class="relative">
                            <i class="fal fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                            <input type="text" placeholder="Search questions..." class="w-full pl-9 pr-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-webropol-primary-500 focus:ring-1 focus:ring-webropol-primary-500 transition-all shadow-sm">
                        </div>
                    </div>
                    
                    <!-- Dynamic navigator items from widgets data -->
                    <div class="p-2 space-y-1">
                        <template x-for="widget in widgets" :key="widget.id">
                            <div class="group flex items-center gap-3 p-3 rounded-lg cursor-pointer transition-all relative overflow-hidden"
                                 :class="selectedWidgetId === widget.id
                                   ? 'bg-white border border-gray-200 shadow-sm hover:border-gray-300'
                                   : 'hover:bg-white hover:shadow-sm border border-transparent hover:border-gray-200'"
                                 @click="goToWidget(widget.id)">
                                <div class="w-1 h-full absolute left-0 top-0 bg-webropol-primary-500 transition-opacity"
                                     :class="selectedWidgetId === widget.id ? 'opacity-100' : 'opacity-0'"></div>
                                <div class="cursor-grab active:cursor-grabbing"
                                     :class="selectedWidgetId === widget.id ? 'text-gray-400' : 'text-gray-300 group-hover:text-gray-400'">
                                    <i class="fas fa-grip-vertical"></i>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="truncate"
                                       :class="selectedWidgetId === widget.id ? 'text-sm font-semibold text-gray-900' : 'text-sm font-medium text-gray-600 group-hover:text-gray-900'"
                                       x-text="widget.navTitle || widget.question"></p>
                                    <p class="truncate"
                                       :class="selectedWidgetId === widget.id ? 'text-xs text-gray-500' : 'text-xs text-gray-400'"
                                       x-text="widget.meta"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Dynamic Widget Canvas -->
                <div class="flex-1 overflow-y-auto px-6 py-8 space-y-12 pb-40 bg-gray-50/30"
                     @click.self="deselect()">

                  <p class="text-center text-gray-500 max-w-xl mx-auto text-sm pt-2">
                    Click on any chart or table to activate the <strong>Context Aware Toolbar</strong>.
                  </p>

                  <template x-for="widget in widgets" :key="widget.id">
                    <webropol-report-widget class="block max-w-5xl mx-auto"
                      :id="widget.id + '-container'"
                      :widget-id="widget.id"
                      :selected="selectedWidgetId === widget.id && selectionType === 'widget'"
                      @click.stop="select('widget', widget.id)">

                      <!-- Widget header -->
                      <div class="px-2 md:px-6 pt-10 md:pt-12 pb-4 pr-14 text-left">
                        <h2 class="text-lg font-bold text-gray-900" x-text="widget.question"></h2>
                        <p class="text-sm text-gray-500 mt-0.5" x-text="widget.meta"></p>
                      </div>

                      <div class="px-2 md:px-6 pb-8 space-y-8">

                        <!-- Chart component -->
                        <webropol-report-chart class="block"
                          :widget-id="widget.id"
                          :selected="selectionType === 'chart' && selectedWidgetId === widget.id"
                          @click.stop="select('chart', widget.id)">

                          <!-- Bar chart -->
                          <template x-if="widget.chartType === 'bar'">
                            <div>
                              <div class="h-64 flex items-end justify-center gap-2 sm:gap-6 px-4 border-b border-gray-100 pb-2">
                                <template x-for="(bar, index) in widget.chartData" :key="index">
                                  <div class="w-16 sm:w-24 rounded-t-lg relative cursor-pointer transition-all hover:opacity-90"
                                       :style="`height: ${bar.percent}%; background-color: ${bar.color}`"
                                       :class="(selectedWidgetId === widget.id && selectedElementIndex === index) ? 'ring-2 ring-offset-2 ring-blue-500 z-10' : ''"
                                       @click.stop="select('element', widget.id, null, index)">
                                    <div class="absolute -top-6 left-1/2 -translate-x-1/2 font-bold text-gray-700 text-sm" x-text="bar.percent + '%'"></div>
                                    <!-- Element Popup -->
                                    <div class="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 bg-white rounded-xl shadow-xl z-50 border border-gray-100 overflow-hidden"
                                         x-show="selectedWidgetId === widget.id && selectedElementIndex === index && selectionType === 'element'"
                                         x-transition:enter="transition ease-out duration-200"
                                         x-transition:enter-start="opacity-0 translate-y-2"
                                         x-transition:enter-end="opacity-100 translate-y-0">
                                      <div class="flex items-center justify-between px-2.5 pt-2 pb-1.5 border-b"
                                           :class="accessibilityMode ? 'bg-amber-50 border-amber-200' : 'bg-gray-50 border-gray-100'">
                                        <span class="text-[10px] font-bold uppercase tracking-wide"
                                              :class="accessibilityMode ? 'text-amber-700' : 'text-gray-400'"
                                              x-text="accessibilityMode ? 'Accessible Colors' : 'Standard Colors'"></span>
                                        <button @click.stop="toggleAccessibility(widget.id)"
                                                class="flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold transition-all"
                                                :class="accessibilityMode ? 'bg-amber-500 text-white shadow-sm' : 'bg-gray-200 text-gray-500 hover:bg-amber-100 hover:text-amber-700'">
                                          <i class="fal fa-universal-access"></i>
                                          <span x-text="accessibilityMode ? 'On' : 'Off'"></span>
                                        </button>
                                      </div>
                                      <div class="flex items-center gap-2 p-2">
                                        <div class="flex items-center gap-1 p-1 rounded" :class="accessibilityMode ? 'bg-amber-50' : 'bg-gray-50'">
                                          <template x-if="!accessibilityMode">
                                            <div class="flex items-center gap-1">
                                              <template x-for="c in standardColors" :key="c">
                                                <button @click.stop="changeBarColor(widget.id, index, c)"
                                                        class="w-6 h-6 rounded-full hover:scale-110 transition-transform ring-offset-1"
                                                        :style="`background-color: ${c}`"
                                                        :class="bar.color === c ? 'ring-2 ring-gray-500 scale-110' : 'ring-1 ring-transparent hover:ring-gray-300'"></button>
                                              </template>
                                            </div>
                                          </template>
                                          <template x-if="accessibilityMode">
                                            <div class="flex items-center gap-1">
                                              <template x-for="c in accessibleColors" :key="c">
                                                <button @click.stop="changeBarColor(widget.id, index, c)"
                                                        class="w-6 h-6 rounded-full hover:scale-110 transition-transform ring-offset-1"
                                                        :style="`background-color: ${c}`"
                                                        :class="bar.color === c ? 'ring-2 ring-amber-500 scale-110' : 'ring-1 ring-transparent hover:ring-amber-300'"></button>
                                              </template>
                                            </div>
                                          </template>
                                          <label @click.stop
                                                 class="w-6 h-6 rounded-full border flex items-center justify-center hover:scale-110 transition-transform cursor-pointer ring-offset-1"
                                                 :class="isCustomColor(bar.color) ? 'ring-2 ring-gray-500 scale-110 border-transparent' : 'border-gray-200 text-gray-400 hover:border-blue-400 hover:text-blue-500'"
                                                 :style="isCustomColor(bar.color) ? `background-color: ${bar.color}` : ''">
                                            <input type="color" class="sr-only" :value="bar.color"
                                                   @input.stop="changeBarColor(widget.id, index, $event.target.value)"
                                                   @change.stop="changeBarColor(widget.id, index, $event.target.value)">
                                            <i class="fal fa-palette text-[10px] pointer-events-none"
                                               :class="isCustomColor(bar.color) ? 'text-white' : ''"></i>
                                          </label>
                                        </div>
                                        <div class="h-6 w-px bg-gray-200"></div>
                                        <button @click.stop="filterByBar(widget.id, index)"
                                                class="flex items-center gap-2 px-3 py-1 rounded hover:bg-gray-50 text-gray-600 hover:text-blue-600 transition-colors text-xs font-medium whitespace-nowrap">
                                          <i class="fal fa-filter"></i> Filter by this option
                                        </button>
                                      </div>
                                    </div>
                                  </div>
                                </template>
                              </div>
                              <!-- Legend -->
                              <div class="flex justify-center gap-6 mt-4 flex-wrap">
                                <template x-for="bar in widget.chartData" :key="bar.label">
                                  <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded-full" :style="`background-color: ${bar.color}`"></div>
                                    <span class="text-sm text-gray-600" x-text="bar.label"></span>
                                  </div>
                                </template>
                              </div>
                            </div>
                          </template>

                          <!-- Matrix bar chart -->
                          <template x-if="widget.chartType === 'matrix-bar'">
                            <div class="space-y-4">
                              <template x-for="row in widget.matrixRows" :key="row.label">
                                <div class="flex items-center gap-4">
                                  <div class="w-36 text-sm font-medium text-gray-600 text-right" x-text="row.label"></div>
                                  <div class="flex-1 h-8 bg-gray-100 rounded-full overflow-hidden flex">
                                    <template x-for="(seg, si) in row.segments" :key="si">
                                      <div :style="`width: ${seg.pct}%; background-color: ${seg.color}`"
                                           :class="si === row.segments.length - 1 ? 'flex items-center justify-end px-2 text-xs font-bold text-white shadow-inner' : ''"
                                           x-text="si === row.segments.length - 1 ? row.score : ''"></div>
                                    </template>
                                  </div>
                                </div>
                              </template>
                            </div>
                          </template>

                          <!-- Gantt chart -->
                          <template x-if="widget.chartType === 'gantt'">
                            <div class="min-w-full overflow-x-auto pb-1">
                              <div class="min-w-[600px]">
                                <div class="flex border-b border-gray-200 pb-2 mb-4">
                                  <div class="w-1/4 text-xs font-bold text-gray-500 uppercase">Phase</div>
                                  <div class="flex-1 flex justify-between text-xs text-gray-400">
                                    <template x-for="month in widget.ganttMonths" :key="month">
                                      <span x-text="month"></span>
                                    </template>
                                  </div>
                                </div>
                                <template x-for="bar in widget.ganttBars" :key="bar.label">
                                  <div class="relative h-10 mb-2 flex items-center">
                                    <div class="w-1/4 text-sm font-semibold text-gray-700" x-text="bar.label"></div>
                                    <div class="flex-1 relative h-full">
                                      <div class="absolute top-2 bottom-2 rounded-md shadow-sm opacity-80 flex items-center px-2"
                                           :style="`left: ${bar.left}%; width: ${bar.width}%; background-color: ${bar.color}`">
                                        <span class="text-xs text-white font-medium truncate" x-text="bar.duration"></span>
                                      </div>
                                    </div>
                                  </div>
                                </template>
                              </div>
                            </div>
                          </template>

                        </webropol-report-chart>

                        <!-- Table component (optional) -->
                        <template x-if="widget.hasTable">
                          <webropol-report-table class="block"
                            :widget-id="widget.id"
                            :selected="selectionType === 'table' && selectedWidgetId === widget.id"
                            @click.stop="select('table', widget.id)">
                            <div class="overflow-x-auto">
                              <table class="w-full text-sm text-left">
                                <thead class="bg-gray-50 text-gray-600 font-semibold uppercase text-xs">
                                  <tr>
                                    <template x-for="(col, ci) in widget.tableColumns" :key="ci">
                                      <th class="px-4 py-3" x-text="col"
                                          :class="ci === 0 ? 'rounded-l-lg' : (ci === widget.tableColumns.length - 1 ? 'text-right rounded-r-lg' : 'text-right')"></th>
                                    </template>
                                  </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50">
                                  <template x-for="(row, ri) in widget.tableRows" :key="ri">
                                    <tr :class="ri === widget.tableRows.length - 1 ? 'bg-gray-50 font-bold border-t-2 border-gray-100' : 'hover:bg-gray-50 transition-colors'">
                                      <template x-for="(cell, ci) in row" :key="ci">
                                        <td class="px-4 py-3 text-gray-700" x-text="cell"
                                            :class="ci > 0 ? 'text-right' : 'font-medium text-gray-800'"></td>
                                      </template>
                                    </tr>
                                  </template>
                                </tbody>
                              </table>
                            </div>
                          </webropol-report-table>
                        </template>

                      </div>
                    </webropol-report-widget>
                  </template>

                </div><!-- / canvas -->
            
            </div> <!-- End Content Container -->
        
        </main>
    </div>



    <!-- Intro Modal (web component) -->
    <webropol-report-intro-modal></webropol-report-intro-modal>

    <script>
        function contextApp() {
            return {
                // ── Selection state ───────────────────────────────────────────
                selectionType: null,        // 'widget' | 'chart' | 'table' | 'element'
                selectedWidgetId: null,
                selectedElementIndex: null,

                // ── Color palettes ────────────────────────────────────────────
                accessibilityMode: false,
                standardColors:   ['#f87171', '#facc15', '#22c55e', '#3b82f6'],
                accessibleColors: ['#0072B2', '#E69F00', '#009E73', '#D55E00'], // Wong palette

                // ── Widget data ───────────────────────────────────────────────
                widgets: [
                    {
                        id: 'w1',
                        navTitle: 'Q1. Satisfaction',
                        question: 'How easy or difficult has it been to use Webropol\'s services over the past six months? Please rate on a scale from 0 to 10, where: 0 = Very difficult and 10 = Very easy.',
                        meta: 'Number of respondents: 1,240',
                        chartType: 'bar',
                        hasTable: true,
                        chartData: [
                            { label: 'Dissatisfied', percent: 25, color: '#f87171' },
                            { label: 'Neutral',      percent: 40, color: '#facc15' },
                            { label: 'Satisfied',    percent: 35, color: '#22c55e' }
                        ],
                        tableColumns: ['Answer Option', 'Count', 'Percentage'],
                        tableRows: [
                            ['Satisfied',    '434',   '35.0%'],
                            ['Neutral',      '496',   '40.0%'],
                            ['Dissatisfied', '310',   '25.0%'],
                            ['Total',        '1,240', '100%']
                        ]
                    },
                    {
                        id: 'w2',
                        navTitle: 'Q4. Departments',
                        question: 'Q4. Rate the following departments',
                        meta: 'Matrix Scale 1-5  •  Respondents: 892',
                        chartType: 'matrix-bar',
                        hasTable: false,
                        matrixRows: [
                            { label: 'Customer Support', score: '4.2', segments: [{ pct: 15, color: '#f87171' }, { pct: 25, color: '#facc15' }, { pct: 60, color: '#22c55e' }] },
                            { label: 'Product Team',     score: '4.5', segments: [{ pct: 10, color: '#f87171' }, { pct: 20, color: '#facc15' }, { pct: 70, color: '#22c55e' }] },
                            { label: 'Sales',            score: '3.1', segments: [{ pct: 30, color: '#f87171' }, { pct: 40, color: '#facc15' }, { pct: 30, color: '#22c55e' }] }
                        ]
                    },
                    {
                        id: 'w3',
                        navTitle: 'Q5. Timeline',
                        question: 'Q5. Project Phases Timeline',
                        meta: 'Gantt View  •  Q3 2024',
                        chartType: 'gantt',
                        hasTable: false,
                        ganttMonths: ['July', 'August', 'September'],
                        ganttBars: [
                            { label: 'Planning',    duration: '4 weeks', left: 0,  width: 40, color: '#a855f7' },
                            { label: 'Development', duration: '6 weeks', left: 35, width: 50, color: '#3b82f6' },
                            { label: 'Testing',     duration: '2 weeks', left: 80, width: 20, color: '#fb923c' }
                        ]
                    }
                ],

                // ── Selection ─────────────────────────────────────────────────
                select(type, widgetId, el = null, index = null) {
                    if (this.selectionType === type && this.selectedWidgetId === widgetId && this.selectedElementIndex === index) return;
                    this.selectionType        = type;
                    this.selectedWidgetId     = widgetId;
                    this.selectedElementIndex = index;
                },

                deselect() {
                    this.selectionType        = null;
                    this.selectedWidgetId     = null;
                    this.selectedElementIndex = null;
                },

                // ── Widget actions ────────────────────────────────────────────
                deleteWidget(widgetId) {
                    this.widgets = this.widgets.filter(w => w.id !== widgetId);
                    this.deselect();
                },

                goToWidget(id) {
                    const el = document.getElementById(id + '-container');
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        this.select('widget', id);
                    }
                },

                // ── Chart / element actions ───────────────────────────────────
                changeBarColor(widgetId, index, color) {
                    const w = this.widgets.find(w => w.id === widgetId);
                    if (w && w.chartData) w.chartData[index].color = color;
                },

                toggleAccessibility(widgetId) {
                    this.accessibilityMode = !this.accessibilityMode;
                    const palette = this.accessibilityMode ? this.accessibleColors : this.standardColors;
                    const w = this.widgets.find(w => w.id === widgetId);
                    if (w && w.chartData) {
                        w.chartData.forEach((bar, i) => { bar.color = palette[i % palette.length]; });
                    }
                },

                isCustomColor(color) {
                    return ![...this.standardColors, ...this.accessibleColors].includes(color);
                },

                filterByBar(widgetId, index) {
                    const w = this.widgets.find(w => w.id === widgetId);
                    if (w && w.chartData && index !== null) {
                        alert(`Filtering by: ${w.chartData[index].label}`);
                    }
                },

                // ── Context label helpers ─────────────────────────────────────
                getContextTitle() {
                    if (this.selectionType === 'chart')   return 'Chart';
                    if (this.selectionType === 'table')   return 'Table';
                    if (this.selectionType === 'element') return 'Element';
                    return 'Widget';
                },

                getContextIcon() {
                    if (this.selectionType === 'chart')   return 'fa-chart-bar';
                    if (this.selectionType === 'table')   return 'fa-table';
                    if (this.selectionType === 'element') return 'fa-square';
                    return 'fa-cube';
                },

                getContextColor() {
                    if (this.selectionType === 'chart')   return 'text-blue-600';
                    if (this.selectionType === 'table')   return 'text-green-600';
                    if (this.selectionType === 'element') return 'text-purple-600';
                    return 'text-gray-600';
                }
            }
        }
    </script>
</body>
</html>
