?<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Tools - Webropol</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'webropol-primary': { 50: '#f0fdff', 100: '#ccf7fe', 200: '#99effd', 300: '#66e0fa', 400: '#22ccf1', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63' },
            'webropol-gray': { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' },
            'webropol-primary-': { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
            'webropol-green': { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
          },
          fontFamily: {
            'sans': ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04)',
            'medium': '0 4px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
            'card': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../design-system/styles/animations.css" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/styles/tokens.css">
  <link rel="stylesheet" href="../design-system/styles/tabs.css">
  <link rel="stylesheet" href="../design-system/styles/mobile-responsive.css">
  <link rel="stylesheet" href="../design-system/styles/adaptive.css">
  <script src="../design-system/utils/viewport-store.js"></script>
  <script src="../design-system/utils/adaptive-controllers.js"></script>
  <link rel="stylesheet" href="../design-system/styles/tabs-unified.css">
  <style>
    [x-cloak] { display: none !important; }

    body {
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 #f8fafc;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(204, 247, 254, 0.8), transparent 30%),
        radial-gradient(circle at top right, rgba(237, 233, 254, 0.65), transparent 28%),
        linear-gradient(180deg, rgba(248, 250, 252, 1) 0%, rgba(240, 253, 255, 0.65) 100%);
    }

    body::-webkit-scrollbar { width: 6px; }
    body::-webkit-scrollbar-track { background: #f8fafc; }
    body::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 6px; }

    /* Feature cards */
    .feature-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.875rem 1rem;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 0.875rem;
      transition: border-color 200ms ease, box-shadow 200ms ease, transform 200ms ease;
      text-decoration: none;
      color: inherit;
      width: 100%;
    }

    .feature-grid {
      display: grid;
      gap: 0.625rem;
      grid-template-columns: 1fr;
    }

    .feature-card.is-link { cursor: pointer; }

    .feature-card.is-link:hover {
      border-color: #99effd;
      box-shadow: 0 10px 28px -16px rgba(8, 145, 178, 0.30);
      transform: translateY(-1px);
    }

    .feature-card.is-link:hover .feature-arrow {
      opacity: 1;
      transform: translateX(2px);
    }

    .feature-arrow {
      margin-left: auto;
      color: #94a3b8;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 200ms ease, transform 200ms ease;
    }

    .feature-body { min-width: 0; flex: 1; }

    .feature-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #0f172a;
      line-height: 1.25;
    }

    .feature-sub {
      margin-top: 0.2rem;
      font-size: 0.825rem;
      color: #64748b;
      line-height: 1.4;
    }

    .feature-badge {
      flex-shrink: 0;
      padding: 0.15rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: 9999px;
    }

    .feature-badge--neutral { background: #f1f5f9; color: #475569; }
    .feature-badge--success { background: #dcfce7; color: #15803d; }
    .feature-badge--warning { background: #ffedd5; color: #c2410c; }

    /* Category sections in responsive grid */
    .category-grid {
      display: grid;
      gap: 2rem 2.5rem;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .category-section {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .category-header {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.25);
    }

    .category-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.2;
    }

    /* Search */
    .search-shell { display: flex; justify-content: center; }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 36rem;
      padding: 0.65rem 0.85rem 0.65rem 1.1rem;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(203, 213, 225, 0.9);
      border-radius: 9999px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      backdrop-filter: blur(8px);
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .search-box:hover { border-color: #99effd; }

    .search-box:focus-within {
      border-color: #06b6d4;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15), 0 8px 24px -16px rgba(15, 23, 42, 0.18);
    }

    .search-box.is-active { background: #ffffff; }

    .search-box__icon {
      color: #94a3b8;
      font-size: 1rem;
      transition: color 180ms ease;
    }

    .search-box:focus-within .search-box__icon { color: #0e7490; }

    .search-box__input {
      flex: 1;
      min-width: 0;
      border: 0;
      background: transparent;
      font-size: 0.9rem;
      color: #0f172a;
      outline: none;
      padding: 0;
    }

    .search-box__input::placeholder { color: #94a3b8; }
    .search-box__input::-webkit-search-cancel-button { -webkit-appearance: none; }

    .search-box__meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .search-box__count {
      font-size: 0.7rem;
      font-weight: 600;
      color: #0e7490;
      background: #ecfeff;
      padding: 0.15rem 0.55rem;
      border-radius: 9999px;
    }

    .search-box__clear {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 9999px;
      border: 0;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease;
    }

    .search-box__clear:hover { background: #f1f5f9; color: #0f172a; }

    .search-box__kbd {
      display: inline-flex;
      align-items: center;
      gap: 0.15rem;
      font-family: 'Inter', sans-serif;
    }

    .search-box__kbd-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.4rem;
      padding: 0.1rem 0.35rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: #475569;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-bottom-width: 2px;
      border-radius: 0.4rem;
      line-height: 1;
    }
  </style>
  <script src="../design-system/components/navigation/Sidebar.js" type="module"></script>
  <script src="../design-system/components/navigation/Header.js" type="module"></script>
  <script src="../design-system/components/navigation/Breadcrumbs.js" type="module"></script>
  <script src="../design-system/components/navigation/Tabs.js" type="module"></script>
  <script src="../design-system/components/interactive/FloatingButton.js" type="module"></script>
  <script src="../design-system/components/modals/Modal.js" type="module"></script>
  <script src="../design-system/components/modals/SettingsModal.js" type="module"></script>
  <script src="../design-system/components/feedback/Avatar.js" type="module"></script>
  <script src="../design-system/utils/theme-manager.js" type="module"></script>
  <script src="../design-system/utils/global-settings-manager.js" type="module"></script>

  <!-- Global Analytics Tracker -->
  <script src="../scripts/analytics-global-tracker.js"></script>
</head>

<body x-data="adminApp()" x-init="init()">
  <div class="flex h-screen adaptive-shell">
    <webropol-sidebar active="admin-tools" base="../"></webropol-sidebar>
    <div class="flex-1 flex flex-col overflow-hidden">
      <webropol-header-enhanced username="Ali Al-Zuhairi" show-notifications="true" show-help="true" show-user-menu="true"></webropol-header-enhanced>
      <div class="bg-white/70 backdrop-blur px-0 sm:px-4">
        <webropol-breadcrumbs
          trail='[{"label":"Home","url":"../index.html"},{"label":"Admin Tools","url":"index.html"}]'></webropol-breadcrumbs>
      </div>
      <main class="flex-1 overflow-y-auto px-4 py-8 lg:px-10 lg:py-10" role="main">
        <div class="mx-auto max-w-7xl space-y-8">

          <header class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
            <div>
              <h1 class="mt-2 text-3xl font-bold text-webropol-gray-900">Admin Tools</h1>
              <p class="mt-2 max-w-xl text-sm text-webropol-gray-600">Manage users, security, modules and tooling — organised in one calm place.</p>
            </div>
            <webropol-tabs
              id="admin-tabs"
              variant="unified"
              active-tab="all"
              size="sm"
              shape="rounded"
              alignment="start"
              no-panels
              tabs='[
                {"id":"all","label":"All"},
                {"id":"users","label":"Users"},
                {"id":"security","label":"Security"},
                {"id":"modules","label":"Modules"},
                {"id":"other","label":"Other"}
              ]'>
            </webropol-tabs>
          </header>

          <div class="search-shell">
            <div class="search-box" :class="{ 'is-active': searchQuery }">
              <i class="fa-light fa-magnifying-glass search-box__icon"></i>
              <input
                x-ref="searchInput"
                type="search"
                x-model="searchQuery"
                @keydown.escape.prevent="searchQuery = ''; $event.target.blur()"
                placeholder="Search admin tools…"
                aria-label="Search Admin Tools"
                class="search-box__input"
              />
              <div class="search-box__meta">
                <span x-show="searchQuery" x-cloak class="search-box__count">
                  <span x-text="totalResults()"></span>
                  <span class="hidden sm:inline">&nbsp;result<span x-show="totalResults() !== 1">s</span></span>
                </span>
                <button
                  type="button"
                  x-show="searchQuery"
                  x-cloak
                  @click="searchQuery = ''; $refs.searchInput.focus()"
                  aria-label="Clear search"
                  class="search-box__clear">
                  <i class="fa-light fa-xmark"></i>
                </button>
                <kbd x-show="!searchQuery" class="search-box__kbd">
                  <span class="search-box__kbd-key">⌘</span>
                  <span class="search-box__kbd-key">K</span>
                </kbd>
              </div>
            </div>
          </div>

          <div class="category-grid">
            <template x-for="category in categories" :key="category.id">
              <section x-show="showSection(category.id)" class="category-section">
                <div class="category-header">
                  <p class="category-title" x-text="category.title"></p>
                </div>
                <div class="feature-grid">
                  <template x-for="item in visibleItems(category.id)" :key="item.title">
                    <div>
                      <template x-if="item.url">
                        <a :href="resolveUrl(item.url)" class="feature-card is-link">
                          <webropol-avatar variant="primary" size="sm" :icon="item.icon"></webropol-avatar>
                          <div class="feature-body">
                            <p class="feature-title" x-text="item.title"></p>
                            <p class="feature-sub" x-text="item.sub"></p>
                          </div>
                          <template x-if="item.badge">
                            <span class="feature-badge" :class="'feature-badge--' + (item.badgeTone || 'neutral')" x-text="item.badge"></span>
                          </template>
                          <i class="fal fa-arrow-right feature-arrow"></i>
                        </a>
                      </template>
                      <template x-if="!item.url">
                        <div class="feature-card">
                          <webropol-avatar variant="primary" size="sm" :icon="item.icon"></webropol-avatar>
                          <div class="feature-body">
                            <p class="feature-title" x-text="item.title"></p>
                            <p class="feature-sub" x-text="item.sub"></p>
                          </div>
                          <template x-if="item.badge">
                            <span class="feature-badge" :class="'feature-badge--' + (item.badgeTone || 'neutral')" x-text="item.badge"></span>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </section>
            </template>

            <div x-show="!hasAnyResults()" x-cloak class="col-span-full flex flex-col items-center gap-2 py-12 text-center">
              <i class="fal fa-magnifying-glass text-3xl text-webropol-gray-300"></i>
              <p class="text-sm font-medium text-webropol-gray-700">No results match "<span x-text="searchQuery"></span>"</p>
              <button @click="searchQuery = ''" class="text-xs font-semibold text-webropol-primary-700 hover:text-webropol-primary-800">Clear search</button>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <!-- Floating Create Button Component -->
  <webropol-floating-button></webropol-floating-button>

  <script>
    function adminApp() {
      return {
        activeTab: 'all',
        searchQuery: '',
        preferenceKey: 'webropol_admin_tools_dashboard',
        moduleBase: '/admin-tools/',
        categories: [
          {
            id: 'users',
            title: 'User Management & Rights',
            items: [
              { title: 'User Management and New User Creation', sub: 'Create and manage user accounts.', icon: 'user-plus', url: 'user-manage-list.html' },
              { title: 'Survey and Folder Rights', sub: 'Configure access permissions.', icon: 'folder-open', url: 'survey-folder-rights.html' },
              { title: 'User Group Management', sub: 'Organize users into groups.', icon: 'users-cog', url: '#' },
              { title: 'Access Requests', sub: 'Pending access requests (0).', icon: 'user-check', url: '#' }
            ]
          },
          {
            id: 'security',
            title: 'Security & Data Protection',
            items: [
              { title: 'User Environment Cleaning', sub: 'Clean up inactive user environments.', icon: 'broom', url: '#', badge: '5542' },
              { title: 'Restore Surveys', sub: 'Recover deleted surveys.', icon: 'undo', url: '#' },
              { title: 'Personal Data Management (GDPR)', sub: 'Data privacy compliance.', icon: 'user-shield', url: '#' },
              { title: 'Password Policy', sub: 'Configure password requirements.', icon: 'key', url: '#' },
              { title: 'Two Factor Authentication', sub: 'Status: Not in use.', icon: 'mobile-alt', url: '#', badge: 'Not in use', badgeTone: 'neutral' },
              { title: 'IP Restrictions', sub: 'Control access by IP address.', icon: 'ban', url: '#' }
            ]
          },
          {
            id: 'modules',
            title: 'Additional Modules',
            items: [
              { title: '360 Evaluations', sub: 'Multi-source feedback system.', icon: 'sync-alt', url: '#' },
              { title: 'Hierarchy', sub: 'Organisational structure management.', icon: 'sitemap', url: '#' },
              { title: 'Hierarchy Administrators', sub: 'Manage hierarchy admins.', icon: 'user-shield', url: '#' },
              { title: 'Suomi.fi Messages', sub: 'Status: In use.', icon: 'envelope-open-text', url: '#', badge: 'In use', badgeTone: 'success' },
              { title: 'Online Payments and Receipts', sub: 'Payment processing system.', icon: 'credit-card', url: '#' },
              { title: 'Answering with Voice', sub: 'Voice response collection.', icon: 'microphone', url: '#' },
              { title: 'Wott Management', sub: 'Advanced workflow tools.', icon: 'cogs', url: '#' }
            ]
          },
          {
            id: 'other',
            title: 'Other Tools',
            items: [
              { title: 'Respondent Login Page', sub: 'Customize user experience.', icon: 'sign-in-alt', url: '#' },
              { title: 'Define Question Keywords for Environment', sub: 'Manage question tagging system.', icon: 'tags', url: '#' },
              { title: 'Create Question IDs', sub: 'Generate unique question identifiers.', icon: 'fingerprint', url: '#' },
              { title: 'Respondent Panel', sub: 'Manage participant database.', icon: 'users', url: '#' },
              { title: 'Do-Not-Contact List', sub: 'Manage blocked contacts.', icon: 'user-slash', url: 'do-not-contact.html' }
            ]
          }
        ],

        init() {
          this.loadPreferences();

          // Global ⌘/Ctrl+K shortcut to focus search
          this._keydownHandler = (event) => {
            if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k') {
              event.preventDefault();
              this.$refs.searchInput?.focus();
              this.$refs.searchInput?.select();
            }
          };
          window.addEventListener('keydown', this._keydownHandler);

          this.$nextTick(() => {
            const tabs = document.getElementById('admin-tabs');
            if (tabs) {
              tabs.setAttribute('active-tab', this.activeTab);
              tabs.addEventListener('webropol-tab-change', (event) => {
                this.activeTab = event.detail.activeTab;
                this.savePreferences();
              });
            }
          });
        },

        loadPreferences() {
          try {
            const existing = JSON.parse(localStorage.getItem(this.preferenceKey) || '{}');
            this.activeTab = existing.activeTab || 'all';
          } catch (error) {
            console.error('localStorage error:', error);
          }
        },

        savePreferences() {
          try {
            const existing = JSON.parse(localStorage.getItem(this.preferenceKey) || '{}');
            existing.activeTab = this.activeTab;
            localStorage.setItem(this.preferenceKey, JSON.stringify(existing));
          } catch (error) {
            console.error('localStorage error:', error);
          }
        },

        matchesSearch(item) {
          const q = (this.searchQuery || '').trim().toLowerCase();
          if (!q) return true;
          return (item.title || '').toLowerCase().includes(q)
            || (item.sub || '').toLowerCase().includes(q);
        },

        visibleItems(sectionId) {
          const cat = this.categories.find(c => c.id === sectionId);
          if (!cat) return [];
          return cat.items.filter(item => this.matchesSearch(item));
        },

        totalResults() {
          return this.categories.reduce((sum, c) => {
            if (this.activeTab !== 'all' && this.activeTab !== c.id) return sum;
            return sum + this.visibleItems(c.id).length;
          }, 0);
        },

        showSection(sectionId) {
          const inTab = this.activeTab === 'all' || this.activeTab === sectionId;
          return inTab && this.visibleItems(sectionId).length > 0;
        },

        hasAnyResults() {
          return this.categories.some(c => this.showSection(c.id));
        },

        resolveUrl(url) {
          if (!url) return url;
          if (/^(https?:|mailto:|tel:|#)/i.test(url)) return url;
          // In SPA mode, convert relative module paths to hash routes so the SPA router handles them
          if (window.WebropolSPA) {
            try {
              const abs = new URL(url, 'http://x' + this.moduleBase);
              const route = abs.pathname.replace(/\/index\.html$/i, '/').replace(/\.html$/i, '');
              return '#' + route + (abs.search || '');
            } catch (_) {
              return url;
            }
          }
          return url;
        }
      }
    }
  </script>
</body>

</html>
