<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit 2-Way SMS - Webropol</title>

    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script src="../design-system/components/navigation/Header.js" type="module"></script>
    <script src="../design-system/components/buttons/Button.js" type="module"></script>
    <script src="../design-system/components/interactive/SurveyStructurePanel.js" type="module"></script>
    <script src="../design-system/components/navigation/SurveyActionTabs.js" type="module"></script>
    <script src="../design-system/components/navigation/SurveyHelperToolbar.js" type="module"></script>
    <script src="../design-system/components/navigation/SurveyEditToolbar.js" type="module"></script>
    <script src="./components/questions/SMSYesNo.js" type="module"></script>
    <script src="./components/questions/SMSNpsQuestion.js" type="module"></script>
    <script src="./components/questions/SMSOpenEnded.js" type="module"></script>

    <link rel="stylesheet" href="../design-system/styles/mobile-responsive.css">

    <script src="../design-system/utils/viewport-store.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'webropol-primary': { 50: '#f0fdff', 100: '#ccf7fe', 200: '#99effd', 300: '#66e0fa', 400: '#22ccf1', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63' },
                        'webropol-gray': { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    },
                    boxShadow: {
                        soft: '0 10px 30px -18px rgba(15, 23, 42, 0.18)',
                        card: '0 8px 30px -16px rgba(15, 23, 42, 0.14)'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .mini-tool {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            width: 90px;
            min-height: 86px;
            border-radius: 18px;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 8px 24px -18px rgba(15, 23, 42, 0.3);
            color: #334155;
            transition: all 0.2s ease;
        }

        .mini-tool:hover,
        .mini-tool.active {
            border-color: #bae6fd;
            background: #f0fdff;
            color: #0e7490;
        }

        .mini-tool i {
            font-size: 1.15rem;
        }

        .sms-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.25rem 0.55rem;
            border-radius: 0.6rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.72rem;
            font-weight: 500;
        }

        /* Unified question card styling (matches surveys/edit.html pattern) */
        .question-card { border: 1px solid #e2e8f0; border-radius: 1.25rem; background: #fff; position: relative; transition: box-shadow .18s ease, border-color .18s ease, background-color .18s ease }
        .question-card:hover { border-color: #d5dde6 }
        .question-card.selected { border-color: #06b6d4; background: #f0fdff; box-shadow: 0 6px 18px -4px rgba(6,182,212,.25) }
        .question-card-header { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; border-bottom: 1px solid #e2e8f0; background: #f8fafc; border-radius: 1.25rem 1.25rem 0 0 }
        .question-card.selected .question-card-header { background: #e0f7fb; border-color: #bae8f1 }
        .question-card-toolbar button { padding: .35rem .55rem; border-radius: .6rem }
        .question-card-collapsed:hover { background: #f8fafc }

        /* Drag handle */
        .drag-handle { position: absolute; right: -12px; top: 50%; transform: translateY(-50%); opacity: 0; transition: opacity 0.2s ease, transform 0.2s ease; z-index: 10; cursor: move; background: white; border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.1) }
        .drag-handle:hover { background: #f8fafc; border-color: #06b6d4 }
        .question-card:hover .drag-handle, .question-card.selected .drag-handle { opacity: 1; right: -16px }
        .drag-handle i { color: #64748b; font-size: 16px }
        .drag-handle:hover i { color: #06b6d4 }

        .question-frame {
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.3rem 1.45rem;
            background: white;
        }

        .choice-dot {
            width: 1rem;
            height: 1rem;
            border-radius: 9999px;
            border: 1.5px solid #111827;
            display: inline-block;
            background: white;
        }

        .rating-dot {
            width: 1rem;
            height: 1rem;
            border-radius: 9999px;
            border: 1px solid #111827;
            display: inline-block;
        }

        .structure-divider {
            /* replaced by survey-structure-resizer */
            display: none;
        }

        /* Structure pane + resizer (mirrors surveys/edit.html) */
        .survey-structure-pane {
            position: relative;
            min-width: 240px;
            max-width: 520px;
        }

        .survey-structure-resizer {
            display: block;
            position: absolute;
            top: 40px;
            bottom: 40px;
            height: auto;
            right: -12px;
            width: 24px;
            cursor: ew-resize;
            z-index: 35;
            background: transparent;
            border: 0;
            padding: 0;
            touch-action: none;
            pointer-events: auto;
        }

        .survey-structure-resizer::before {
            content: '';
            position: absolute;
            top: 12px;
            bottom: 12px;
            left: 11px;
            width: 2px;
            border-radius: 9999px;
            background: linear-gradient(to bottom, rgba(148,163,184,0.1), rgba(148,163,184,0.55), rgba(148,163,184,0.1));
            transition: background 0.2s ease;
        }

        .survey-structure-resizer::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 4px;
            transform: translateY(-50%);
            width: 16px;
            height: 64px;
            border-radius: 9999px;
            border: 1px solid #cbd5e1;
            background-color: #ffffff;
            background-image: radial-gradient(circle, #94a3b8 1.2px, transparent 1.2px);
            background-size: 6px 10px;
            background-position: center;
            box-shadow: 0 2px 10px rgba(15,23,42,0.12);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .survey-structure-resizer:hover::before,
        body.is-resizing-structure .survey-structure-resizer::before {
            background: linear-gradient(to bottom, rgba(6,182,212,0.1), rgba(6,182,212,0.7), rgba(6,182,212,0.1));
        }

        .survey-structure-resizer:hover::after,
        body.is-resizing-structure .survey-structure-resizer::after {
            border-color: #06b6d4;
            background-color: #f0fdff;
            box-shadow: 0 4px 14px rgba(6,182,212,0.22);
            transform: translateY(-50%) scale(1.03);
        }

        body.is-resizing-structure {
            cursor: ew-resize;
            user-select: none;
        }

        body.is-resizing-structure * {
            cursor: ew-resize !important;
        }
    </style>
</head>
    <body x-data="smsEditApp()" class="text-webropol-gray-900">
    <div class="flex h-screen adaptive-shell">
        <webropol-sidebar active="sms" base="../"></webropol-sidebar>
        <div class="flex-1 flex flex-col overflow-hidden">
            <webropol-header-enhanced username="Ali Al-Zuhairi" show-notifications show-help show-user-menu show-theme-selector></webropol-header-enhanced>
            <main class="flex-1 overflow-hidden px-2 py-2 lg:px-1" role="main">
                <div class="flex items-center justify-between border-b border-webropol-gray-300">
                    <webropol-survey-action-tabs active="edit" context="sms"></webropol-survey-action-tabs>

                    <webropol-survey-helper-toolbar
                        x-bind:survey-name="surveyName"
                        survey-id="Sms348267"
                        active-page="edit"
                        access-level="admin"
                        survey-status="active">
                    </webropol-survey-helper-toolbar>
                </div>

                <div class="border-b border-webropol-gray-200">
                    <webropol-survey-edit-toolbar items="add-question,personal-data,settings"></webropol-survey-edit-toolbar>
                </div>

                <div class="flex h-[calc(100vh-265px)] overflow-hidden">
                    <div id="smsStructurePane" class="survey-structure-pane shrink-0 mb-4 mt-4" style="width: 280px;">
                        <webropol-survey-structure title="Survey structure"
                            @structure-move="handleMove($event)"
                            @structure-copy="handleCopy($event)"
                            @structure-delete="handleDelete($event)">
                            <div class="space-y-3">
                                <webropol-survey-page page-number="1" page-name="SMS 1" question-count="1" expanded>
                                    <webropol-survey-question
                                        question-id="sms-q1"
                                        question-text="Would you recommend Webropol to a colleague or friend?"
                                        question-type="radio">
                                    </webropol-survey-question>
                                </webropol-survey-page>

                                <webropol-survey-page page-number="2" page-name="SMS 2" question-count="1" expanded>
                                    <webropol-survey-question
                                        question-id="sms-q2"
                                        question-text="How easy or difficult has it been to use Webropol&#39;s services?"
                                        question-type="nps">
                                    </webropol-survey-question>
                                </webropol-survey-page>

                                <webropol-survey-page page-number="3" page-name="SMS 3" question-count="1" expanded>
                                    <webropol-survey-question
                                        question-id="sms-q3"
                                        question-text="Please share any comments or suggestions you may have:"
                                        question-type="textarea">
                                    </webropol-survey-question>
                                </webropol-survey-page>

                                <!-- Thank you page -->
                                <div class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg cursor-pointer
                                            hover:bg-white hover:shadow-sm transition-all duration-150">
                                    <span class="shrink-0 w-5 h-5 rounded flex items-center justify-center bg-green-50 text-green-600">
                                        <i class="fal fa-hand-holding-heart text-[10px]"></i>
                                    </span>
                                    <span class="text-xs text-webropol-gray-700">Thank you page</span>
                                </div>
                            </div>
                        </webropol-survey-structure>
                        <button id="smsStructureResizer" class="survey-structure-resizer" type="button" aria-label="Resize structure panel" title="Resize panel"></button>
                    </div>

                    <section class="flex-1 overflow-y-auto px-8 py-4">
                        <div class="max-w-[760px] mx-auto pb-10">

                            <!-- Q1: Yes / No selection -->
                            <webropol-sms-yes-no
                                question-number="1"
                                sms-number="1"
                                characters="94"
                                credits="1"
                                mode="edit"
                                question-id="sms-q1"
                                question-text="Would you recommend Webropol to a colleague or friend? Please respond with: Y = Yes and N = No"
                                class="block mb-4">
                            </webropol-sms-yes-no>

                            <!-- Q2: NPS scale -->
                            <webropol-sms-nps
                                question-number="2"
                                sms-number="2"
                                characters="169"
                                credits="2"
                                mode="edit"
                                question-id="sms-q2"
                                question-text="How easy or difficult has it been to use Webropol&#39;s services over the past six months? Please rate on a scale from 0 to 10, where: 0 = Very difficult and 10 = Very easy."
                                class="block mb-4">
                            </webropol-sms-nps>

                            <!-- Q3: Open-ended -->
                            <webropol-sms-open-ended
                                question-number="3"
                                sms-number="3"
                                characters="54"
                                credits="1"
                                mode="edit"
                                question-id="sms-q3"
                                question-text="Please share any comments or suggestions you may have:"
                                class="block mb-4">
                            </webropol-sms-open-ended>

                            <!-- Thank you page -->
                            <div class="flex justify-center mb-4">
                                <div class="sms-badge"><i class="fal fa-hand-holding-heart"></i> Thank You Page</div>
                            </div>
                            <div class="question-card p-5 mb-5 relative cursor-pointer"
                                 x-data="{ editing: false }"
                                 :class="editing ? 'selected' : ''"
                                 @click="editing = true"
                                 @click.outside="editing = false">

                                <!-- View mode -->
                                <div x-show="!editing" class="text-center py-5">
                                    <p class="text-lg" :class="thankYouMessage ? 'text-webropol-gray-800 font-medium' : 'text-4xl text-webropol-gray-500'" x-text="thankYouMessage || 'Add thank you page message'"></p>
                                </div>

                                <!-- Edit mode -->
                                <div x-show="editing" @click.stop>
                                    <div class="flex items-center justify-between mb-3 pb-3 border-b border-webropol-gray-100">
                                        <div class="flex items-center gap-2 bg-white px-2 py-1 rounded-lg border border-webropol-gray-100">
                                            <div class="flex items-center justify-center w-6 h-6 text-webropol-primary-600 bg-webropol-primary-50 rounded-md">
                                                <i class="fal fa-hand-holding-heart text-xs"></i>
                                            </div>
                                            <span class="text-xs font-medium text-webropol-gray-700">Thank You Page</span>

                                </div>
                            </div>

                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script>
        function smsEditApp() {
            return {
                surveyName: 'HealthCare 2Way SMS Survey',
                thankYouMessage: 'Thank you for your responses!',
                init() {
                    const query = new URLSearchParams(window.__pageQueryString || window.location.search || '');
                    const id = query.get('id');
                    const names = {
                        '1': 'HealthCare 2Way SMS Survey',
                        '2': 'Customer Satisfaction Survey',
                        '3': 'Event attendance confirmation',
                        '4': 'Support case callback request',
                        '5': 'Delivery experience pulse'
                    };
                    if (id && names[id]) {
                        this.surveyName = names[id];
                    }

                    // Load persisted thank you message
                    try {
                        const saved = localStorage.getItem('webropol_sms_thankyou');
                        if (saved) this.thankYouMessage = saved;
                    } catch (e) { /* ignore */ }

                    // Persist thank you message on change
                    this.$watch('thankYouMessage', (val) => {
                        try {
                            localStorage.setItem('webropol_sms_thankyou', val);
                        } catch (e) { /* ignore */ }
                    });

                    // Compute total credits per recipient from question components and persist
                    this.$nextTick(() => {
                        const questionEls = document.querySelectorAll('[credits]');
                        const total = Array.from(questionEls).reduce((sum, el) => {
                            return sum + (parseInt(el.getAttribute('credits'), 10) || 0);
                        }, 0);
                        if (total > 0) {
                            try {
                                localStorage.setItem('webropol_sms_credits_per_recipient', total);
                            } catch (e) { /* ignore */ }
                        }

                        // Resize handler
                        initSmsResizer();

                        // Wire structure panel question selection → canvas scroll + activation
                        document.querySelector('webropol-survey-structure')?.addEventListener('question-select', (e) => {
                            const { questionId, selected } = e.detail;
                            if (!selected) return;
                            // Activate the corresponding SMS question card
                            window.dispatchEvent(new CustomEvent('sms-click-question', { detail: questionId }));
                            // Scroll the canvas card into view (exclude sidebar webropol-survey-question elements)
                            const cardEl = document.querySelector(`[question-id="${questionId}"]:not(webropol-survey-question)`);
                            if (cardEl) cardEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        });

                        // Wire SMS card activation → deselect other structure questions
                        window.addEventListener('sms-click-question', (e) => {
                            const activeId = e.detail;
                            document.querySelectorAll('webropol-survey-question').forEach(qEl => {
                                const checkbox = qEl.querySelector('.question-checkbox');
                                if (!checkbox) return;
                                const shouldCheck = qEl.getAttribute('question-id') === activeId;
                                if (checkbox.checked !== shouldCheck) {
                                    checkbox.checked = shouldCheck;
                                    checkbox.dispatchEvent(new Event('change', { bubbles: true }));
                                }
                            });
                        });
                    });
                },

                handleMove(event) {
                    console.log('Move', event.detail);
                },

                handleCopy(event) {
                    console.log('Copy', event.detail);
                },

                handleDelete(event) {
                    const { selectedCount } = event.detail;
                    if (selectedCount > 0 && confirm(`Delete ${selectedCount} selected item(s)?`)) {
                        console.log('Delete', selectedCount, 'items');
                    }
                }
            };
        }

        function initSmsResizer() {
            const pane = document.getElementById('smsStructurePane');
            const resizer = document.getElementById('smsStructureResizer');
            if (!pane || !resizer) return;
            if (resizer.dataset.bound === '1') return;

            const STORAGE_KEY = 'webropol_sms_structure_width';
            const MIN_WIDTH = 240;
            const MAX_WIDTH = 520;

            const clamp = (value) => Math.max(MIN_WIDTH, Math.min(MAX_WIDTH, value));
            const applyWidth = (width) => { pane.style.width = `${clamp(width)}px`; };

            let savedWidth = null;
            try { savedWidth = Number(localStorage.getItem(STORAGE_KEY)); } catch (_) {}
            if (Number.isFinite(savedWidth) && savedWidth > 0) applyWidth(savedWidth);

            let dragging = false, startX = 0, startWidth = 0;

            const onPointerMove = (e) => {
                if (!dragging) return;
                applyWidth(startWidth + (e.clientX - startX));
            };

            const onPointerUp = () => {
                if (!dragging) return;
                dragging = false;
                document.body.classList.remove('is-resizing-structure');
                window.removeEventListener('pointermove', onPointerMove);
                window.removeEventListener('pointerup', onPointerUp);
                try { localStorage.setItem(STORAGE_KEY, String(Math.round(clamp(pane.getBoundingClientRect().width)))); } catch (_) {}
            };

            resizer.addEventListener('pointerdown', (e) => {
                if (e.button !== 0) return;
                dragging = true;
                startX = e.clientX;
                startWidth = pane.getBoundingClientRect().width;
                document.body.classList.add('is-resizing-structure');
                window.addEventListener('pointermove', onPointerMove);
                window.addEventListener('pointerup', onPointerUp);
                e.preventDefault();
            });

            resizer.dataset.bound = '1';
        }
    </script>
</body>
