<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2-Way SMS - Webropol</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="../design-system/components/navigation/Sidebar.js" type="module"></script>
  <script src="../design-system/components/navigation/Header.js" type="module"></script>
  <script src="../design-system/components/navigation/Breadcrumbs.js" type="module"></script>
  <script src="../design-system/components/interactive/FloatingButton.js" type="module"></script>
  <script src="../design-system/components/forms/Dropdown.js" type="module"></script>
  <link rel="stylesheet" href="../design-system/styles/tokens.css">
  <link rel="stylesheet" href="../design-system/styles/tabs.css">
  <link rel="stylesheet" href="../design-system/styles/mobile-responsive.css">
  <link rel="stylesheet" href="../design-system/styles/adaptive.css">
  <script src="../design-system/utils/viewport-store.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'webropol-primary': { 50: '#f0fdff', 100: '#ccf7fe', 200: '#99effd', 300: '#66e0fa', 400: '#22ccf1', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63' },
            'webropol-gray': { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' },
            'primary': { 50: '#f0fdff', 100: '#ccf7fe', 200: '#99effd', 300: '#66e0fa', 400: '#22ccf1', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490' }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          },
          boxShadow: {
            soft: '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04)',
            medium: '0 4px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)'
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .search-modern {
      border: 1px solid #e2e8f0;
      background: white;
    }

    .search-modern:focus {
      border-color: #0891b2;
      box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1);
    }

    .status-draft {
      background-color: #fef3c7;
      color: #d97706;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-published {
      background-color: #dcfce7;
      color: #16a34a;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-closed {
      background-color: #f1f5f9;
      color: #64748b;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .custom-checkbox {
      width: 1rem;
      height: 1rem;
      color: #0891b2;
      background-color: #f1f5f9;
      border-color: #cbd5e1;
      border-radius: 0.25rem;
    }

    .table-row:hover {
      background-color: #f8fafc;
    }

    .distribution-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s ease;
      border: 2px solid;
      text-decoration: none;
      cursor: pointer;
    }

    .distribution-badge:hover {
      transform: scale(1.05);
    }

    .distribution-badge.web {
      background: rgba(191, 97, 106, 0.1);
      border-color: rgba(191, 97, 106, 0.3);
      color: #bf616a;
    }

    .distribution-badge.email {
      background: rgba(235, 203, 139, 0.15);
      border-color: rgba(235, 203, 139, 0.4);
      color: #d4a574;
    }

    .distribution-badge.sms {
      background: rgba(180, 142, 173, 0.12);
      border-color: rgba(180, 142, 173, 0.35);
      color: #b48ead;
    }

    .distribution-methods {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .folder-selected {
      background: linear-gradient(to right, rgba(204, 247, 254, 0.9), rgba(204, 247, 254, 0.9));
      color: #0e7490;
      box-shadow: inset 0 0 0 2px rgba(102, 224, 250, 0.4);
    }
  </style>
</head>
<body x-data="smsListApp()">
  <div class="flex h-screen adaptive-shell">
    <webropol-sidebar active="sms" base="../"></webropol-sidebar>
    <div class="flex-1 flex flex-col overflow-hidden xl:ml-0 ml-0">
      <webropol-header-enhanced username="Ali Al-Zuhairi" show-notifications="true" show-help="true" show-user-menu="true" show-theme-selector="true"></webropol-header-enhanced>
      <div class="bg-white/70 backdrop-blur px-0 sm:px-4">
        <webropol-breadcrumbs trail='[{"label":"Home","url":"../index.html"},{"label":"2-Way SMS","url":"list.html"}]'></webropol-breadcrumbs>
      </div>
      <main class="flex-1 overflow-y-auto px-6 py-10 lg:px-10" role="main">
        <div class="max-w-7xl mx-auto">
          <div class="flex items-start justify-between mb-8">
            <h1 class="text-5xl font-bold text-webropol-gray-900 tracking-tight">2-Way SMS</h1>
            <button type="button" @click="openSurvey()" class="inline-flex items-center px-6 py-3 bg-webropol-primary-600 hover:bg-webropol-primary-700 text-white font-semibold rounded-2xl shadow-medium transition-colors">
              <i class="fal fa-plus mr-3"></i>
              <span>Create new</span>
            </button>
          </div>

          <div class="flex flex-col xl:flex-row gap-5">
            <aside class="w-full xl:w-[250px] shrink-0">
              <div class="bg-white rounded-2xl shadow-soft border border-webropol-gray-100/80 overflow-hidden">
                <div class="p-5 border-b border-webropol-gray-100 flex items-center justify-between">
                  <div class="flex items-center gap-3">
                    <i class="fal fa-folder text-webropol-gray-700"></i>
                    <span class="text-2xl font-semibold text-webropol-gray-900">Folders</span>
                  </div>
                  <button type="button" class="w-10 h-10 rounded-xl bg-webropol-primary-500 hover:bg-webropol-primary-600 text-white shadow-medium transition-colors">
                    <i class="fal fa-plus"></i>
                  </button>
                </div>

                <div class="p-5 border-b border-webropol-gray-100">
                  <div class="relative">
                    <input type="text" x-model="folderSearchTerm" placeholder="Search folders..." class="search-modern w-full pl-11 pr-4 py-3 rounded-xl focus:outline-none text-sm text-webropol-gray-700">
                    <i class="fal fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-webropol-gray-400 text-sm"></i>
                  </div>
                </div>

                <div class="p-4 space-y-2">
                  <template x-for="folder in filteredFolders" :key="folder.id">
                    <button type="button" @click="selectedFolderId = folder.id" class="w-full flex items-center justify-between p-3 rounded-xl transition-all" :class="selectedFolderId === folder.id ? 'folder-selected' : 'hover:bg-webropol-gray-50'">
                      <div class="flex items-center">
                        <div class="w-8 h-8 flex items-center justify-center rounded-lg mr-3 bg-webropol-gray-100">
                          <i :class="folder.icon + ' text-webropol-primary-600'"></i>
                        </div>
                        <span class="font-medium text-webropol-gray-800" x-text="folder.name"></span>
                      </div>
                      <div class="flex items-center space-x-2">
                        <span class="text-xs bg-webropol-gray-100 text-webropol-gray-600 rounded-full px-2 py-1 font-medium" x-text="folder.count"></span>
                        <i class="fal fa-angle-right text-xs text-webropol-gray-500"></i>
                      </div>
                    </button>
                  </template>
                </div>
              </div>
            </aside>

            <section class="flex-1 min-w-0">
              <div class="bg-white rounded-2xl shadow-soft border border-webropol-gray-100/80 overflow-hidden">
                <div class="border-b border-webropol-gray-200 px-6 py-4">
                  <div class="flex items-center justify-between gap-4 flex-wrap">
                    <div class="webropol-tabs-unified webropol-tabs-rounded-container" role="tablist" aria-label="SMS filter">
                      <button type="button" @click="setTab('all')" class="webropol-unified-tab webropol-tab-rounded size-sm" :class="currentTab === 'all' ? 'active' : ''">
                        <i class="fas fa-list mr-2"></i>
                        All
                      </button>
                      <button type="button" @click="setTab('draft')" class="webropol-unified-tab webropol-tab-rounded size-sm" :class="currentTab === 'draft' ? 'active' : ''">
                        <i class="fas fa-edit mr-2"></i>
                        Drafts
                      </button>
                      <button type="button" @click="setTab('published')" class="webropol-unified-tab webropol-tab-rounded size-sm" :class="currentTab === 'published' ? 'active' : ''">
                        <i class="fas fa-globe mr-2"></i>
                        Published
                      </button>
                      <button type="button" @click="setTab('closed')" class="webropol-unified-tab webropol-tab-rounded size-sm" :class="currentTab === 'closed' ? 'active' : ''">
                        <i class="fas fa-lock mr-2"></i>
                        Closed
                      </button>
                    </div>

                    <div class="flex items-center gap-4 flex-wrap">
                      <div class="relative">
                        <input type="text" x-model="searchQuery" placeholder="Search surveys" class="w-64 pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-webropol-primary-500/20 focus:border-webropol-primary-500 text-sm">
                        <i class="fal fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                      </div>
                      <div class="flex items-center space-x-2">
                        <label class="relative inline-flex items-center cursor-pointer">
                          <input type="checkbox" class="sr-only peer" :checked="showOnlyMine" @change="toggleShowOnlyMine()">
                          <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-webropol-primary-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-webropol-primary-600"></div>
                        </label>
                        <span class="text-sm text-gray-600">Show only mine</span>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="px-6 py-4">
                  <div class="overflow-x-auto">
                    <table class="w-full min-w-[760px]">
                      <thead>
                        <tr class="border-b border-gray-200">
                          <th class="text-left py-3 text-sm font-medium text-gray-700 w-8">
                            <input type="checkbox" class="custom-checkbox">
                          </th>
                          <th class="text-left py-3 text-sm font-medium text-gray-700">Name</th>
                          <th class="text-left py-3 text-sm font-medium text-gray-700">Distributed via</th>
                          <th class="text-left py-3 text-sm font-medium text-gray-700">Replies</th>
                          <th class="text-left py-3 text-sm font-medium text-gray-700">
                            <div class="flex items-center space-x-1">
                              <span>Last edited</span>
                              <i class="fal fa-chevron-down text-xs"></i>
                            </div>
                          </th>
                          <th class="text-left py-3 text-sm font-medium text-gray-700">Created by</th>
                          <th class="text-left py-3 text-sm font-medium text-gray-700">Status</th>
                          <th class="text-left py-3 text-sm font-medium text-gray-700 w-8"></th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="survey in filteredSurveys" :key="survey.id">
                          <tr class="table-row border-b border-gray-100 cursor-pointer">
                            <td class="py-3">
                              <input type="checkbox" class="custom-checkbox">
                            </td>
                            <td class="py-3">
                              <a :href="surveyHref(survey.id)" @click.prevent="openSurvey(survey.id)" class="text-webropol-primary-600 hover:text-webropol-primary-700 font-medium" x-text="survey.name"></a>
                            </td>
                            <td class="py-3">
                              <div class="distribution-methods">
                                <template x-for="channel in survey.channels" :key="channel">
                                  <span class="distribution-badge" :class="channel" :title="channelLabel(channel)">
                                    <i :class="channelIcon(channel)"></i>
                                  </span>
                                </template>
                              </div>
                            </td>
                            <td class="py-3 text-gray-700" x-text="survey.replies"></td>
                            <td class="py-3 text-gray-600 text-sm" x-text="survey.lastEdited"></td>
                            <td class="py-3 text-gray-700" x-text="survey.createdBy"></td>
                            <td class="py-3">
                              <span :class="statusClass(survey.status)" x-text="statusLabel(survey.status)"></span>
                            </td>
                            <td class="py-3">
                              <button type="button" class="text-gray-400 hover:text-gray-600">
                                <i class="fal fa-ellipsis-v"></i>
                              </button>
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                  <div class="flex items-center justify-between mt-6">
                    <div class="flex items-center space-x-2 w-32">
                      <webropol-dropdown value="20 rows" options='[{"label":"20 rows","value":"20 rows"},{"label":"50 rows","value":"50 rows"},{"label":"100 rows","value":"100 rows"}]'></webropol-dropdown>
                    </div>
                    <div class="flex items-center space-x-1">
                      <button class="w-8 h-8 bg-webropol-primary-500 text-white rounded-lg flex items-center justify-center text-sm font-medium">1</button>
                      <button class="w-8 h-8 hover:bg-gray-100 rounded-lg flex items-center justify-center text-sm font-medium text-gray-700">2</button>
                      <button class="w-8 h-8 hover:bg-gray-100 rounded-lg flex items-center justify-center text-sm font-medium text-gray-700">3</button>
                      <button class="w-8 h-8 hover:bg-gray-100 rounded-lg flex items-center justify-center text-sm font-medium text-gray-700">4</button>
                      <span class="text-gray-500 text-sm px-2">...</span>
                      <button class="w-8 h-8 hover:bg-gray-100 rounded-lg flex items-center justify-center text-sm font-medium text-gray-700">12</button>
                      <button class="w-8 h-8 hover:bg-gray-100 rounded-lg flex items-center justify-center text-sm font-medium text-gray-700">
                        <i class="fal fa-chevron-right"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </main>
    </div>
  </div>

  <webropol-floating-button></webropol-floating-button>

  <script>
    function smsListApp() {
      return {
        showOnlyMine: false,
        currentTab: 'all',
        searchQuery: '',
        folderSearchTerm: '',
        selectedFolderId: 'organizational',
        folders: [
          { id: 'organizational', name: 'Organizational', count: 38, icon: 'fas fa-building' },
          { id: 'my-surveys', name: 'My Surveys', count: 14, icon: 'fas fa-user' }
        ],
        surveys: [
          { id: 1, folderId: 'organizational', name: 'Customer Satisfaction SMS', status: 'published', replies: 156, lastEdited: '20.01.2024 14:22', createdBy: 'Ali Al-Zuhairi', owner: 'Ali Al-Zuhairi', channels: ['sms', 'email'] },
          { id: 2, folderId: 'my-surveys', name: 'HealthCare 2Way SMS Survey', status: 'published', replies: 89, lastEdited: '18.01.2024 09:15', createdBy: 'Ali Al-Zuhairi', owner: 'Ali Al-Zuhairi', channels: ['sms'] },
          { id: 3, folderId: 'organizational', name: 'Product Feedback SMS', status: 'draft', replies: 0, lastEdited: '22.01.2024 16:45', createdBy: 'Mike Johnson', owner: 'Mike Johnson', channels: [] },
          { id: 4, folderId: 'organizational', name: 'Market Research SMS Q1', status: 'published', replies: 234, lastEdited: '08.01.2024 11:30', createdBy: 'Sarah Wilson', owner: 'Sarah Wilson', channels: ['web', 'sms'] },
          { id: 5, folderId: 'organizational', name: 'Event Follow-up SMS', status: 'closed', replies: 67, lastEdited: '30.11.2023 13:20', createdBy: 'David Brown', owner: 'David Brown', channels: ['sms', 'email'] },
          { id: 6, folderId: 'my-surveys', name: 'Support Callback Flow', status: 'published', replies: 12, lastEdited: '25.01.2024 10:05', createdBy: 'Ali Al-Zuhairi', owner: 'Ali Al-Zuhairi', channels: ['sms'] }
        ],
        get filteredFolders() {
          const query = this.folderSearchTerm.trim().toLowerCase();
          if (!query) return this.folders;
          return this.folders.filter((folder) => folder.name.toLowerCase().includes(query));
        },
        get filteredSurveys() {
          return this.surveys.filter((survey) => {
            const matchesFolder = !this.selectedFolderId || survey.folderId === this.selectedFolderId;
            const matchesTab = this.currentTab === 'all' || survey.status === this.currentTab;
            const matchesMine = !this.showOnlyMine || survey.owner === 'Ali Al-Zuhairi';
            const query = this.searchQuery.trim().toLowerCase();
            const matchesSearch = !query || survey.name.toLowerCase().includes(query) || survey.createdBy.toLowerCase().includes(query);
            return matchesFolder && matchesTab && matchesMine && matchesSearch;
          });
        },
        setTab(tab) {
          this.currentTab = tab;
        },
        toggleShowOnlyMine() {
          this.showOnlyMine = !this.showOnlyMine;
        },
        surveyHref(id) {
          return `../index.html#/sms/edit?id=${id}`;
        },
        openSurvey(id) {
          const route = `/sms/edit${id ? `?id=${id}` : ''}`;
          if (window.WebropolSPA && typeof window.WebropolSPA.navigate === 'function') {
            window.WebropolSPA.navigate(route);
            return;
          }
          window.location.href = id ? this.surveyHref(id) : '../index.html#/sms/edit';
        },
        channelIcon(channel) {
          const icons = {
            web: 'fal fa-link',
            email: 'fal fa-envelope',
            sms: 'fal fa-comment-dots'
          };
          return icons[channel] || 'fal fa-circle';
        },
        channelLabel(channel) {
          const labels = {
            web: 'Web Link',
            email: 'Email',
            sms: 'SMS'
          };
          return labels[channel] || channel;
        },
        statusClass(status) {
          return {
            draft: 'status-draft',
            published: 'status-published',
            closed: 'status-closed'
          }[status] || 'status-draft';
        },
        statusLabel(status) {
          return {
            draft: 'Draft',
            published: 'Published',
            closed: 'Closed'
          }[status] || status;
        }
      };
    }
  </script>
</body>
</html>
