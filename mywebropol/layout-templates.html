<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Templates - Webropol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'webropol-primary': { 50: '#f0fdff', 100: '#ccf7fe', 200: '#99effd', 300: '#66e0fa', 400: '#22ccf1', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63' },
                        'webropol-gray': { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    },
                    boxShadow: {
                        'card': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)'
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="../design-system/styles/animations.css" rel="stylesheet">
    <link href="../design-system/styles/tokens.css" rel="stylesheet">
    <script src="../design-system/components/navigation/Sidebar.js" type="module"></script>
    <script src="../design-system/components/navigation/Header.js" type="module"></script>
    <script src="../design-system/components/navigation/Breadcrumbs.js" type="module"></script>
    <script src="../design-system/components/buttons/Button.js" type="module"></script>
    <script src="../design-system/utils/theme-manager.js" type="module"></script>
    <script src="../design-system/utils/global-settings-manager.js" type="module"></script>
    <script src="../scripts/analytics-global-tracker.js"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 #f8fafc;
        }

        body::-webkit-scrollbar {
            width: 6px;
        }

        body::-webkit-scrollbar-track {
            background: #f8fafc;
        }

        body::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 6px;
        }

        .layout-shell {
            background:
                radial-gradient(circle at top left, rgba(34, 204, 241, 0.12), transparent 28%),
                radial-gradient(circle at top right, rgba(14, 116, 144, 0.10), transparent 24%),
                linear-gradient(180deg, #f6fbfd 0%, #edf5f8 52%, #e6f0f4 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 18px 60px -28px rgba(15, 23, 42, 0.18);
        }

        .hero-gradient {
            background:
                linear-gradient(135deg, rgba(6, 182, 212, 0.14), rgba(255, 255, 255, 0.75) 42%, rgba(14, 116, 144, 0.08)),
                rgba(255, 255, 255, 0.9);
        }

        .segmented-tab {
            color: #475569;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .segmented-tab.active {
            background: linear-gradient(135deg, #0891b2, #0e7490);
            color: white;
            box-shadow: 0 12px 24px -16px rgba(8, 145, 178, 0.9);
        }

        .segmented-tab:not(.active):hover {
            background: rgba(240, 249, 255, 0.85);
            border-color: rgba(125, 211, 252, 0.4);
            color: #0e7490;
        }

        .scope-tab {
            border: 1px solid rgba(226, 232, 240, 0.9);
            background: rgba(248, 250, 252, 0.95);
            transition: all 0.2s ease;
        }

        .scope-tab.active {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.16), rgba(14, 116, 144, 0.08));
            border-color: rgba(8, 145, 178, 0.28);
            box-shadow: inset 0 0 0 1px rgba(8, 145, 178, 0.08);
        }

        .search-input {
            background: white;
            border: 1px solid rgba(203, 213, 225, 0.9);
            color: #0f172a;
            box-shadow: 0 8px 20px -16px rgba(15, 23, 42, 0.22);
        }

        .search-input:focus {
            border-color: rgba(8, 145, 178, 0.75);
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.14);
            outline: none;
        }

        .stats-tile {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.88));
            border: 1px solid rgba(226, 232, 240, 0.85);
        }

        .table-shell {
            border: 1px solid rgba(226, 232, 240, 0.95);
            background: rgba(255, 255, 255, 0.88);
            overflow: hidden;
        }

        .table-shell th {
            background: linear-gradient(180deg, rgba(248, 250, 252, 0.96), rgba(241, 245, 249, 0.96));
            color: #475569;
            border-bottom: 1px solid rgba(226, 232, 240, 0.95);
            font-size: 12px;
            font-weight: 600;
        }

        .table-shell td {
            border-bottom: 1px solid rgba(241, 245, 249, 0.95);
            color: #334155;
            font-size: 13px;
        }

        .row-card {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 10px 30px -24px rgba(15, 23, 42, 0.18);
        }

        .action-link {
            color: #0891b2;
            transition: color 0.2s ease;
        }

        .action-link:hover {
            color: #0e7490;
        }

        .page-link {
            color: #64748b;
            transition: all 0.2s ease;
        }

        .page-link.active {
            color: #0891b2;
            font-weight: 700;
        }

        .page-link:hover {
            color: #0e7490;
        }

        .selection-checkbox {
            accent-color: #0891b2;
        }

        .floating-orb {
            position: absolute;
            border-radius: 9999px;
            filter: blur(12px);
            opacity: 0.7;
            pointer-events: none;
        }

        .floating-orb.one {
            width: 10rem;
            height: 10rem;
            top: -2.5rem;
            right: -1.5rem;
            background: rgba(34, 211, 238, 0.16);
        }

        .floating-orb.two {
            width: 7rem;
            height: 7rem;
            bottom: -1.5rem;
            left: 35%;
            background: rgba(14, 116, 144, 0.12);
        }
    </style>
</head>

<body x-data="layoutTemplatesApp()" x-init="init()" class="layout-shell">
    <div class="flex h-screen">
        <webropol-sidebar active="mywebropol" base="../"></webropol-sidebar>
        <div class="flex-1 flex flex-col overflow-hidden xl:ml-0 ml-0">
            <webropol-header username="Ali Al-Zuhairi" show-notifications="true" show-help="true" show-user-menu="true"></webropol-header>
            <div class="bg-white/70 backdrop-blur px-0 sm:px-4">
                <webropol-breadcrumbs trail='[{"label":"Home","url":"../index.html"},{"label":"MyWebropol","url":"index.html"},{"label":"Layout templates","url":"layout-templates.html"}]'></webropol-breadcrumbs>
            </div>
            <main class="flex-1 overflow-y-auto px-4 py-4 lg:px-8 pb-16" role="main">
                <div class="max-w-7xl mx-auto">
                    <section class="hero-gradient glass-card relative overflow-hidden rounded-3xl p-6 lg:p-8">
                        <div class="floating-orb one"></div>
                        <div class="floating-orb two"></div>
                        <div class="relative z-10">
                            <div>
                                <div class="mb-4 inline-flex items-center gap-2 rounded-full border border-webropol-primary-100 bg-white/80 px-3 py-1 text-xs font-semibold uppercase tracking-[0.18em] text-webropol-primary-700">
                                    <i class="fal fa-layer-group"></i>
                                    Template Workspace
                                </div>
                                <h1 class="text-3xl font-semibold tracking-tight text-webropol-gray-900 lg:text-4xl">Layout templates</h1>
                                <p class="mt-3 max-w-2xl text-sm leading-7 text-webropol-gray-600 lg:text-base">
                                    Manage files, images, and layout templates in one workspace that matches the rest of MyWebropol. Switch sections, search quickly, and keep shared assets organized.
                                </p>
                            </div>

                            <div class="mt-6 flex flex-wrap gap-2 border-t border-white/60 pt-5">
                                <template x-for="tab in topTabs" :key="tab.id">
                                    <button
                                        type="button"
                                        @click="setTopTab(tab.id)"
                                        class="segmented-tab rounded-2xl px-4 py-3 text-sm font-semibold"
                                        :class="{ 'active': activeTopTab === tab.id }">
                                        <span x-text="tab.label"></span>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </section>

                    <section class="mt-6">
                        <div class="glass-card rounded-3xl p-5 lg:p-6">
                            <div class="flex flex-col gap-4 xl:flex-row xl:items-start xl:justify-between">
                                <div>
                                    <h2 class="text-xl font-semibold text-webropol-gray-900" x-text="activeTopTabLabel()"></h2>
                                    <p class="mt-2 text-sm leading-6 text-webropol-gray-600">
                                        <span x-text="visibleTemplatesCount()"></span>
                                        <span x-text="searchTerm ? matchingResultsLabel() : availableResultsLabel()"></span>
                                    </p>

                                    <div class="mt-4 flex flex-wrap gap-2" aria-label="Template tabs">
                                        <template x-for="tab in sideTabs()" :key="tab.id">
                                            <button
                                                type="button"
                                                @click="setSideTab(tab.id)"
                                                class="scope-tab inline-flex items-center gap-2 rounded-2xl px-4 py-2.5 text-sm font-semibold"
                                                :class="{ 'active': activeSideTab === tab.id }">
                                                <span x-text="tab.label"></span>
                                                <span class="rounded-full bg-white px-2 py-0.5 text-xs font-semibold text-webropol-primary-700 shadow-sm" x-text="tab.count"></span>
                                            </button>
                                        </template>
                                    </div>
                                </div>

                                <div class="flex flex-col gap-3 sm:flex-row sm:items-center xl:justify-end">
                                    <label class="relative block">
                                        <span class="sr-only" x-text="searchAriaLabel()"></span>
                                        <input
                                            x-model.trim="searchTerm"
                                            @input="page = 1"
                                            type="search"
                                            :placeholder="searchPlaceholder()"
                                            class="search-input h-11 w-full min-w-[240px] rounded-2xl px-4 pr-11 text-sm">
                                        <i class="fal fa-search pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-sm text-webropol-gray-400"></i>
                                    </label>

                                    <div class="flex flex-wrap items-center gap-2">
                                        <webropol-button
                                            variant="secondary"
                                            size="sm"
                                            roundness="xl"
                                            icon="plus"
                                            @click="createTemplate()">
                                            <span x-text="createButtonLabel()"></span>
                                        </webropol-button>
                                        <webropol-button
                                            variant="secondary"
                                            size="sm"
                                            roundness="xl"
                                            icon="trash"
                                            :disabled="selectedIds.length === 0"
                                            @click="deleteSelected()">
                                            Delete
                                        </webropol-button>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-6" x-show="pagedTemplates().length > 0" x-cloak>
                                <div class="table-shell hidden rounded-3xl xl:block">
                                    <table class="min-w-full border-collapse">
                                        <thead>
                                            <tr>
                                                <th class="w-12 px-5 py-4 text-left">
                                                    <input
                                                        type="checkbox"
                                                        class="selection-checkbox h-4 w-4"
                                                        :checked="allVisibleSelected()"
                                                        :disabled="pagedTemplates().length === 0"
                                                        @change="toggleSelectAll($event.target.checked)">
                                                </th>
                                                <th class="px-5 py-4 text-left">
                                                    <button type="button" class="inline-flex items-center gap-2" @click="sortBy('name')">
                                                        <span x-text="columnHeading()"></span>
                                                        <i class="fal" :class="sortIcon('name')"></i>
                                                    </button>
                                                </th>
                                                <th class="px-5 py-4 text-left">Created by</th>
                                                <th class="px-5 py-4 text-left">
                                                    <button type="button" class="inline-flex items-center gap-2" @click="sortBy('lastModified')">
                                                        <span>Last modified</span>
                                                        <i class="fal" :class="sortIcon('lastModified')"></i>
                                                    </button>
                                                </th>
                                                <th class="px-5 py-4 text-left">Status</th>
                                                <th class="px-5 py-4 text-left">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template x-for="template in pagedTemplates()" :key="template.id">
                                                <tr class="transition-colors hover:bg-webropol-primary-50/40">
                                                    <td class="px-5 py-4 align-top">
                                                        <input
                                                            type="checkbox"
                                                            class="selection-checkbox mt-1 h-4 w-4"
                                                            :checked="selectedIds.includes(template.id)"
                                                            @change="toggleSelection(template.id)">
                                                    </td>
                                                    <td class="px-5 py-4 align-top">
                                                        <div class="flex items-start gap-3">
                                                            <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-webropol-primary-50 text-webropol-primary-600">
                                                                <i class="fal" :class="currentSectionIcon()"></i>
                                                            </div>
                                                            <div>
                                                                <div class="font-semibold text-webropol-gray-900" x-text="template.name"></div>
                                                                <div class="mt-1 text-xs text-webropol-gray-500" x-text="activeTopTabLabel()"></div>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td class="px-5 py-4 align-top text-webropol-gray-600" x-text="template.createdBy"></td>
                                                    <td class="px-5 py-4 align-top text-webropol-gray-600" x-text="template.lastModified"></td>
                                                    <td class="px-5 py-4 align-top">
                                                        <span class="rounded-full px-3 py-1 text-xs font-semibold"
                                                            :class="statusBadgeClass(template)"
                                                            x-text="statusBadgeLabel(template)"></span>
                                                    </td>
                                                    <td class="px-5 py-4 align-top">
                                                        <div class="flex flex-wrap items-center gap-4 text-sm font-medium">
                                                            <button type="button" class="action-link" @click="renameTemplate(template)">Rename</button>
                                                            <button type="button" class="action-link" x-show="isImageSection()" @click="toggleDefaultLogo(template)" x-text="template.isDefaultLogo ? 'Remove default logo' : 'Set as default logo'"></button>
                                                            <button type="button" class="action-link" @click="shareTemplate(template)" x-text="template.sharedTo ? 'Unshare' : 'Share'"></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>

                                <div class="space-y-4 xl:hidden">
                                    <template x-for="template in pagedTemplates()" :key="`${template.id}-mobile`">
                                        <div class="row-card rounded-3xl p-4">
                                            <div class="flex items-start justify-between gap-3">
                                                <div class="flex items-start gap-3">
                                                    <input
                                                        type="checkbox"
                                                        class="selection-checkbox mt-1 h-4 w-4"
                                                        :checked="selectedIds.includes(template.id)"
                                                        @change="toggleSelection(template.id)">
                                                    <div>
                                                        <div class="font-semibold text-webropol-gray-900" x-text="template.name"></div>
                                                        <div class="mt-1 text-xs text-webropol-gray-500" x-text="template.createdBy"></div>
                                                    </div>
                                                </div>
                                                <span class="rounded-full px-3 py-1 text-xs font-semibold"
                                                    :class="statusBadgeClass(template)"
                                                    x-text="statusBadgeLabel(template)"></span>
                                            </div>
                                            <div class="mt-4 flex items-center justify-between text-sm text-webropol-gray-500">
                                                <span x-text="template.lastModified"></span>
                                                <div class="flex flex-wrap items-center gap-4 justify-end">
                                                    <button type="button" class="action-link" @click="renameTemplate(template)">Rename</button>
                                                    <button type="button" class="action-link" x-show="isImageSection()" @click="toggleDefaultLogo(template)" x-text="template.isDefaultLogo ? 'Remove default logo' : 'Set as default logo'"></button>
                                                    <button type="button" class="action-link" @click="shareTemplate(template)" x-text="template.sharedTo ? 'Unshare' : 'Share'"></button>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </div>

                                <div class="mt-5 flex flex-col gap-4 border-t border-webropol-gray-100 pt-5 text-sm text-webropol-gray-500 lg:flex-row lg:items-center lg:justify-between">
                                    <div class="flex flex-wrap items-center gap-3">
                                        <button type="button" class="disabled:opacity-40" :disabled="page === 1" @click="goToPage(1)">
                                            <i class="fal fa-step-backward"></i>
                                        </button>
                                        <button type="button" class="disabled:opacity-40" :disabled="page === 1" @click="goToPage(page - 1)">
                                            <i class="fal fa-caret-left mr-1"></i> Previous
                                        </button>
                                        <span>
                                            Showing <span x-text="visibleRangeStart()"></span>-<span x-text="visibleRangeEnd()"></span> of <span x-text="visibleTemplatesCount()"></span>
                                        </span>
                                        <button type="button" class="disabled:opacity-40" :disabled="page === totalPages()" @click="goToPage(page + 1)">
                                            Next <i class="fal fa-caret-right ml-1"></i>
                                        </button>
                                        <button type="button" class="disabled:opacity-40" :disabled="page === totalPages()" @click="goToPage(totalPages())">
                                            <i class="fal fa-step-forward"></i>
                                        </button>
                                    </div>

                                    <div class="flex flex-wrap items-center gap-2">
                                        <span>Show on page</span>
                                        <template x-for="size in pageSizes" :key="String(size)">
                                            <button
                                                type="button"
                                                class="page-link px-1"
                                                :class="{ 'active': pageSize === size }"
                                                @click="setPageSize(size)"
                                                x-text="size"></button>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-6" x-show="pagedTemplates().length === 0" x-cloak>
                                <div class="rounded-3xl border border-dashed border-webropol-primary-200 bg-gradient-to-br from-white via-webropol-primary-50/40 to-white p-8 text-center">
                                    <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-3xl bg-white text-webropol-primary-600 shadow-soft">
                                        <i class="fal text-xl" :class="currentSectionIcon()"></i>
                                    </div>
                                    <h3 class="mt-5 text-xl font-semibold text-webropol-gray-900" x-text="emptyStateTitle()"></h3>
                                    <p class="mx-auto mt-3 max-w-xl text-sm leading-7 text-webropol-gray-600" x-text="emptyStateDescription()"></p>
                                    <div class="mt-6 flex flex-wrap items-center justify-center gap-3">
                                        <webropol-button
                                            variant="primary"
                                            size="sm"
                                            roundness="xl"
                                            icon="plus"
                                            @click="createTemplate()">
                                            <span x-text="createButtonLabel()"></span>
                                        </webropol-button>
                                        <webropol-button
                                            x-show="searchTerm"
                                            variant="tertiary"
                                            size="sm"
                                            roundness="xl"
                                            icon="times"
                                            @click="clearSearch()">
                                            Clear search
                                        </webropol-button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script>
        function layoutTemplatesApp() {
            return {
                storageKey: 'webropol_layout_templates',
                activeTopTab: 'survey',
                activeSideTab: 'own',
                searchTerm: '',
                sortKey: 'name',
                sortDirection: 'asc',
                page: 1,
                pageSize: 20,
                pageSizes: [20, 50, 100, 'All'],
                selectedIds: [],
                topTabs: [
                    { id: 'survey', label: 'Survey templates', itemLabel: 'template', pluralLabel: 'templates', ownLabel: 'Own templates', sharedLabel: 'Shared templates', icon: 'fa-list-check' },
                    { id: 'event', label: 'Event templates', itemLabel: 'template', pluralLabel: 'templates', ownLabel: 'Own templates', sharedLabel: 'Shared templates', icon: 'fa-calendar-star' },
                    { id: 'reporting', label: 'Reporting templates', itemLabel: 'template', pluralLabel: 'templates', ownLabel: 'Own templates', sharedLabel: 'Shared templates', icon: 'fa-chart-mixed' },
                    { id: 'files', label: 'Files', itemLabel: 'file', pluralLabel: 'files', ownLabel: 'Own files', sharedLabel: 'Shared files', icon: 'fa-folder-open' },
                    { id: 'images', label: 'Images', itemLabel: 'image', pluralLabel: 'images', ownLabel: 'Own images', sharedLabel: 'Shared images', icon: 'fa-image' }
                ],
                templates: {
                    files: { own: [], shared: [] },
                    images: { own: [], shared: [] },
                    survey: { own: [], shared: [] },
                    event: { own: [], shared: [] },
                    reporting: { own: [], shared: [] }
                },

                init() {
                    this.loadTemplates();
                },

                defaultTemplates() {
                    return {
                        files: {
                            own: [
                                { id: 'files-own-1', name: 'Brand Guidelines PDF', createdBy: 'Ali Al-Zuhairi', lastModified: '08 Mar 2026', sharedTo: '' },
                                { id: 'files-own-2', name: 'Campaign Header Pack', createdBy: 'Ali Al-Zuhairi', lastModified: '04 Mar 2026', sharedTo: '' }
                            ],
                            shared: [
                                { id: 'files-shared-1', name: 'Corporate Fonts Package', createdBy: 'Brand Team', lastModified: '01 Mar 2026', sharedTo: 'Workspace' }
                            ]
                        },
                        images: {
                            own: [
                                { id: 'images-own-1', name: 'Webropol Primary Logo', createdBy: 'Ali Al-Zuhairi', lastModified: '09 Mar 2026', sharedTo: '', isDefaultLogo: true },
                                { id: 'images-own-2', name: 'Survey Hero Illustration', createdBy: 'Ali Al-Zuhairi', lastModified: '03 Mar 2026', sharedTo: '' }
                            ],
                            shared: [
                                { id: 'images-shared-1', name: 'Event Banner Visual', createdBy: 'Design Team', lastModified: '27 Feb 2026', sharedTo: 'Workspace', isDefaultLogo: false }
                            ]
                        },
                        survey: {
                            own: [],
                            shared: [
                                { id: 'survey-shared-1', name: 'Employee Pulse Layout', createdBy: 'Webropol Team', lastModified: '04 Mar 2026', sharedTo: 'Workspace' },
                                { id: 'survey-shared-2', name: 'Customer Satisfaction Classic', createdBy: 'Research Ops', lastModified: '28 Feb 2026', sharedTo: 'Workspace' },
                                { id: 'survey-shared-3', name: 'NPS Compact Layout', createdBy: 'Insight Studio', lastModified: '17 Feb 2026', sharedTo: 'Workspace' },
                                { id: 'survey-shared-4', name: 'Brand Tracker Form', createdBy: 'Webropol Team', lastModified: '11 Feb 2026', sharedTo: 'Workspace' }
                            ]
                        },
                        event: {
                            own: [],
                            shared: [
                                { id: 'event-shared-1', name: 'Registration Confirmation Flow', createdBy: 'Events Team', lastModified: '06 Mar 2026', sharedTo: 'Workspace' },
                                { id: 'event-shared-2', name: 'Event Follow-up Summary', createdBy: 'Webropol Team', lastModified: '19 Feb 2026', sharedTo: 'Workspace' }
                            ]
                        },
                        reporting: {
                            own: [
                                { id: 'report-own-1', name: 'Executive Summary View', createdBy: 'Ali Al-Zuhairi', lastModified: '02 Mar 2026', sharedTo: '' }
                            ],
                            shared: [
                                { id: 'report-shared-1', name: 'Board Reporting Layout', createdBy: 'Webropol Team', lastModified: '25 Feb 2026', sharedTo: 'Workspace' },
                                { id: 'report-shared-2', name: 'Insight Dashboard Export', createdBy: 'Analytics Team', lastModified: '20 Feb 2026', sharedTo: 'Workspace' }
                            ]
                        }
                    };
                },

                loadTemplates() {
                    const defaults = this.defaultTemplates();

                    try {
                        const existing = JSON.parse(localStorage.getItem(this.storageKey) || '{}');
                        this.templates = {
                            files: {
                                own: Array.isArray(existing?.files?.own) ? existing.files.own : defaults.files.own,
                                shared: Array.isArray(existing?.files?.shared) ? existing.files.shared : defaults.files.shared
                            },
                            images: {
                                own: Array.isArray(existing?.images?.own) ? existing.images.own : defaults.images.own,
                                shared: Array.isArray(existing?.images?.shared) ? existing.images.shared : defaults.images.shared
                            },
                            survey: {
                                own: Array.isArray(existing?.survey?.own) ? existing.survey.own : defaults.survey.own,
                                shared: Array.isArray(existing?.survey?.shared) ? existing.survey.shared : defaults.survey.shared
                            },
                            event: {
                                own: Array.isArray(existing?.event?.own) ? existing.event.own : defaults.event.own,
                                shared: Array.isArray(existing?.event?.shared) ? existing.event.shared : defaults.event.shared
                            },
                            reporting: {
                                own: Array.isArray(existing?.reporting?.own) ? existing.reporting.own : defaults.reporting.own,
                                shared: Array.isArray(existing?.reporting?.shared) ? existing.reporting.shared : defaults.reporting.shared
                            }
                        };
                    } catch (error) {
                        console.error('localStorage error:', error);
                        this.templates = defaults;
                    }
                },

                saveTemplates() {
                    try {
                        const existing = JSON.parse(localStorage.getItem(this.storageKey) || '{}');
                        const merged = {
                            ...existing,
                            files: this.templates.files,
                            images: this.templates.images,
                            survey: this.templates.survey,
                            event: this.templates.event,
                            reporting: this.templates.reporting
                        };

                        localStorage.setItem(this.storageKey, JSON.stringify(merged));
                    } catch (error) {
                        console.error('localStorage error:', error);
                    }
                },

                sectionConfig() {
                    return this.topTabs.find((tab) => tab.id === this.activeTopTab) || this.topTabs[0];
                },

                sideTabs() {
                    const section = this.templates[this.activeTopTab];
                    return [
                        { id: 'own', label: this.sectionConfig().ownLabel, count: section.own.length },
                        { id: 'shared', label: this.sectionConfig().sharedLabel, count: section.shared.length }
                    ];
                },

                setTopTab(tabId) {
                    this.activeTopTab = tabId;
                    this.activeSideTab = 'own';
                    this.resetListState();
                },

                setSideTab(tabId) {
                    this.activeSideTab = tabId;
                    this.resetListState();
                },

                resetListState() {
                    this.searchTerm = '';
                    this.selectedIds = [];
                    this.page = 1;
                },

                currentTemplates() {
                    return this.templates[this.activeTopTab][this.activeSideTab];
                },

                activeTopTabLabel() {
                    return this.topTabs.find((tab) => tab.id === this.activeTopTab)?.label || 'Templates';
                },

                activeScopeLabel() {
                    return this.activeSideTab === 'own' ? this.sectionConfig().ownLabel : this.sectionConfig().sharedLabel;
                },

                activeCollectionCount() {
                    return this.currentTemplates().length;
                },

                activeOwnCount() {
                    return this.templates[this.activeTopTab].own.length;
                },

                activeSharedCount() {
                    return this.templates[this.activeTopTab].shared.length;
                },

                visibleTemplatesCount() {
                    return this.sortedTemplates().length;
                },

                isImageSection() {
                    return this.activeTopTab === 'images';
                },

                searchAriaLabel() {
                    return `Search ${this.sectionConfig().pluralLabel} by name`;
                },

                searchPlaceholder() {
                    return `Search ${this.sectionConfig().pluralLabel} by name`;
                },

                createButtonLabel() {
                    const itemLabel = this.sectionConfig().itemLabel;
                    return `New ${itemLabel}`;
                },

                columnHeading() {
                    const itemLabel = this.sectionConfig().itemLabel;
                    return itemLabel.charAt(0).toUpperCase() + itemLabel.slice(1);
                },

                currentSectionIcon() {
                    return this.sectionConfig().icon;
                },

                matchingResultsLabel() {
                    return `matching ${this.sectionConfig().pluralLabel} in the current filter.`;
                },

                availableResultsLabel() {
                    return `${this.sectionConfig().pluralLabel} available in the current view.`;
                },

                statusBadgeLabel(template) {
                    if (this.isImageSection() && template.isDefaultLogo) {
                        return 'Default logo';
                    }

                    return template.sharedTo || 'Private';
                },

                statusBadgeClass(template) {
                    if (this.isImageSection() && template.isDefaultLogo) {
                        return 'bg-amber-50 text-amber-700';
                    }

                    return template.sharedTo ? 'bg-webropol-primary-50 text-webropol-primary-700' : 'bg-webropol-gray-100 text-webropol-gray-700';
                },

                filteredTemplates() {
                    const term = this.searchTerm.toLowerCase();
                    return this.currentTemplates().filter((template) => {
                        if (!term) {
                            return true;
                        }

                        return [template.name, template.createdBy, template.lastModified].some((value) => String(value || '').toLowerCase().includes(term));
                    });
                },

                sortedTemplates() {
                    const direction = this.sortDirection === 'asc' ? 1 : -1;
                    return [...this.filteredTemplates()].sort((left, right) => {
                        const leftValue = this.getSortValue(left, this.sortKey);
                        const rightValue = this.getSortValue(right, this.sortKey);

                        if (leftValue < rightValue) {
                            return -1 * direction;
                        }

                        if (leftValue > rightValue) {
                            return 1 * direction;
                        }

                        return 0;
                    });
                },

                getSortValue(template, key) {
                    if (key === 'lastModified') {
                        return new Date(template.lastModified).getTime() || 0;
                    }

                    return String(template[key] || '').toLowerCase();
                },

                pagedTemplates() {
                    const templates = this.sortedTemplates();
                    if (this.pageSize === 'All') {
                        return templates;
                    }

                    const start = (this.page - 1) * this.pageSize;
                    return templates.slice(start, start + this.pageSize);
                },

                totalPages() {
                    if (this.pageSize === 'All') {
                        return 1;
                    }

                    return Math.max(1, Math.ceil(this.sortedTemplates().length / this.pageSize));
                },

                goToPage(nextPage) {
                    this.page = Math.min(this.totalPages(), Math.max(1, nextPage));
                },

                setPageSize(size) {
                    this.pageSize = size;
                    this.page = 1;
                },

                visibleRangeStart() {
                    if (this.visibleTemplatesCount() === 0) {
                        return 0;
                    }

                    if (this.pageSize === 'All') {
                        return 1;
                    }

                    return (this.page - 1) * this.pageSize + 1;
                },

                visibleRangeEnd() {
                    if (this.pageSize === 'All') {
                        return this.visibleTemplatesCount();
                    }

                    return Math.min(this.page * this.pageSize, this.visibleTemplatesCount());
                },

                sortBy(key) {
                    if (this.sortKey === key) {
                        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        this.sortKey = key;
                        this.sortDirection = 'asc';
                    }
                },

                sortIcon(key) {
                    if (this.sortKey !== key) {
                        return 'fa-sort text-[10px]';
                    }

                    return this.sortDirection === 'asc' ? 'fa-sort-up text-[10px]' : 'fa-sort-down text-[10px]';
                },

                toggleSelection(templateId) {
                    if (this.selectedIds.includes(templateId)) {
                        this.selectedIds = this.selectedIds.filter((id) => id !== templateId);
                        return;
                    }

                    this.selectedIds = [...this.selectedIds, templateId];
                },

                allVisibleSelected() {
                    const visibleIds = this.pagedTemplates().map((template) => template.id);
                    return visibleIds.length > 0 && visibleIds.every((id) => this.selectedIds.includes(id));
                },

                toggleSelectAll(checked) {
                    const visibleIds = this.pagedTemplates().map((template) => template.id);

                    if (checked) {
                        this.selectedIds = Array.from(new Set([...this.selectedIds, ...visibleIds]));
                        return;
                    }

                    this.selectedIds = this.selectedIds.filter((id) => !visibleIds.includes(id));
                },

                deleteSelected() {
                    const list = this.currentTemplates().filter((template) => !this.selectedIds.includes(template.id));
                    this.templates[this.activeTopTab][this.activeSideTab] = list;
                    this.selectedIds = [];
                    this.saveTemplates();
                    this.goToPage(this.page);
                },

                renameTemplate(template) {
                    const nextName = window.prompt('Rename template', template.name);
                    if (!nextName || !nextName.trim()) {
                        return;
                    }

                    template.name = nextName.trim();
                    template.lastModified = this.formatToday();
                    this.saveTemplates();
                },

                shareTemplate(template) {
                    template.sharedTo = template.sharedTo ? '' : 'Workspace';
                    template.lastModified = this.formatToday();
                    this.saveTemplates();
                },

                toggleDefaultLogo(template) {
                    if (!this.isImageSection()) {
                        return;
                    }

                    const shouldSetAsDefault = !template.isDefaultLogo;
                    ['own', 'shared'].forEach((scope) => {
                        this.templates.images[scope] = this.templates.images[scope].map((image) => ({
                            ...image,
                            isDefaultLogo: shouldSetAsDefault ? image.id === template.id : false
                        }));
                    });

                    this.saveTemplates();
                },

                createTemplate() {
                    const nextName = window.prompt(`Name your new ${this.sectionConfig().itemLabel}`);
                    if (!nextName || !nextName.trim()) {
                        return;
                    }

                    const template = {
                        id: `${this.activeTopTab}-own-${Date.now()}`,
                        name: nextName.trim(),
                        createdBy: 'Ali Al-Zuhairi',
                        lastModified: this.formatToday(),
                        sharedTo: ''
                    };

                    this.activeSideTab = 'own';
                    this.templates[this.activeTopTab].own = [template, ...this.templates[this.activeTopTab].own];
                    this.page = 1;
                    this.saveTemplates();
                },

                clearSearch() {
                    this.searchTerm = '';
                    this.page = 1;
                },

                emptyStateTitle() {
                    if (this.searchTerm) {
                        return `No ${this.sectionConfig().pluralLabel} match your search`;
                    }

                    if (this.activeSideTab === 'own') {
                        return `Add your first ${this.sectionConfig().itemLabel}`;
                    }

                    return `No shared ${this.sectionConfig().pluralLabel} yet`;
                },

                emptyStateDescription() {
                    if (this.searchTerm) {
                        return `Try a different keyword or clear the search to view all ${this.sectionConfig().pluralLabel} in this scope.`;
                    }

                    if (this.activeSideTab === 'own') {
                        return `Create a new ${this.sectionConfig().itemLabel} for this section and it will appear here with the rest of your personal assets.`;
                    }

                    return `Shared ${this.sectionConfig().pluralLabel} will appear here when they are published to your workspace or team.`;
                },

                formatToday() {
                    return new Date().toLocaleDateString('en-GB', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric'
                    });
                }
            };
        }
    </script>
