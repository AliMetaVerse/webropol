<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Templates - Webropol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/50ef2d3cf8.js" crossorigin="anonymous"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'webropol-primary': { 50: '#f0fdff', 100: '#ccf7fe', 200: '#99effd', 300: '#66e0fa', 400: '#22ccf1', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63' },
                        'webropol-gray': { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    },
                    boxShadow: {
                        'card': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)'
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="../design-system/styles/animations.css" rel="stylesheet">
    <link href="../design-system/styles/tokens.css" rel="stylesheet">
    <script src="../design-system/components/navigation/Sidebar.js" type="module"></script>
    <script src="../design-system/components/navigation/Header.js" type="module"></script>
    <script src="../design-system/components/navigation/Breadcrumbs.js" type="module"></script>
    <script src="../design-system/utils/theme-manager.js" type="module"></script>
    <script src="../design-system/utils/global-settings-manager.js" type="module"></script>
    <script src="../scripts/analytics-global-tracker.js"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        :root {
            --layout-shell: #dfe7ec;
            --layout-panel: #eef3f6;
            --layout-border: #c8d4dc;
            --layout-border-strong: #7ea6be;
            --layout-text: #2f3d4a;
            --layout-text-soft: #627180;
            --layout-accent: #0e7490;
            --layout-accent-soft: #e6f5f9;
            --layout-table-header: #f4f7f9;
            --layout-disabled: #d8dde2;
        }

        body {
            font-family: 'Inter', sans-serif;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 #f8fafc;
        }

        body::-webkit-scrollbar {
            width: 6px;
        }

        body::-webkit-scrollbar-track {
            background: #f8fafc;
        }

        body::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 6px;
        }

        .legacy-shell {
            background: linear-gradient(180deg, #f3f7fa 0%, var(--layout-shell) 100%);
        }

        .legacy-panel {
            background: rgba(238, 243, 246, 0.96);
            border: 1px solid var(--layout-border);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .legacy-top-tab {
            border-right: 1px solid var(--layout-border);
            border-bottom: 1px solid var(--layout-border);
            color: var(--layout-text-soft);
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .legacy-top-tab.active {
            background: rgba(255, 255, 255, 0.9);
            color: var(--layout-text);
            border-bottom-color: transparent;
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.9);
        }

        .legacy-side-tab {
            color: var(--layout-text-soft);
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .legacy-side-tab.active {
            background: rgba(255, 255, 255, 0.74);
            border-left-color: var(--layout-accent);
            color: var(--layout-text);
            font-weight: 600;
        }

        .legacy-toolbar-input {
            background: white;
            border: 1px solid #aebbc6;
            color: var(--layout-text);
        }

        .legacy-table {
            border: 1px solid var(--layout-border);
            background: white;
        }

        .legacy-table th {
            background: var(--layout-table-header);
            color: #275770;
            border-bottom: 2px solid var(--layout-border-strong);
            font-size: 12px;
            font-weight: 600;
        }

        .legacy-table td {
            color: var(--layout-text);
            border-bottom: 1px solid #d8e0e6;
            font-size: 12px;
        }

        .legacy-action {
            color: var(--layout-accent);
            transition: color 0.2s ease;
        }

        .legacy-action:hover {
            color: #155e75;
        }

        .legacy-page-link.active {
            color: #e36c13;
            font-weight: 700;
        }

        .legacy-checkbox {
            accent-color: var(--layout-accent);
        }

        .legacy-delete:disabled {
            color: #aeb7bf;
            background: rgba(255, 255, 255, 0.55);
            cursor: not-allowed;
        }
    </style>
</head>

<body x-data="layoutTemplatesApp()" x-init="init()" class="legacy-shell">
    <div class="flex h-screen">
        <webropol-sidebar active="mywebropol" base="../"></webropol-sidebar>
        <div class="flex-1 flex flex-col overflow-hidden xl:ml-0 ml-0">
            <webropol-header username="Ali Al-Zuhairi" show-notifications="true" show-help="true" show-user-menu="true"></webropol-header>
            <div class="bg-white/70 backdrop-blur px-0 sm:px-4">
                <webropol-breadcrumbs trail='[{"label":"Home","url":"../index.html"},{"label":"MyWebropol","url":"index.html"},{"label":"Layout templates","url":"layout-templates.html"}]'></webropol-breadcrumbs>
            </div>
            <main class="flex-1 overflow-y-auto px-4 py-4 lg:px-8 pb-16" role="main">
                <div class="max-w-7xl mx-auto">
                    <section class="legacy-panel rounded-sm overflow-hidden">
                        <div class="px-6 pt-5 pb-3">
                            <h1 class="text-[2rem] font-semibold text-webropol-gray-900 tracking-tight">Layout templates</h1>
                        </div>

                        <div class="border-b border-[var(--layout-border)] bg-[#e7edf1]">
                            <div class="flex flex-wrap text-[13px]">
                                <template x-for="tab in topTabs" :key="tab.id">
                                    <button
                                        type="button"
                                        @click="setTopTab(tab.id)"
                                        class="legacy-top-tab px-4 py-3"
                                        :class="{ 'active': activeTopTab === tab.id }"
                                        x-text="tab.label"></button>
                                </template>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-[126px_minmax(0,1fr)] min-h-[610px]">
                            <aside class="border-r border-[var(--layout-border)] bg-[#edf2f5] py-3">
                                <nav class="space-y-1 text-[13px]" aria-label="Template scope tabs">
                                    <template x-for="tab in sideTabs()" :key="tab.id">
                                        <button
                                            type="button"
                                            @click="setSideTab(tab.id)"
                                            class="legacy-side-tab flex w-full items-center justify-between px-3 py-3 text-left"
                                            :class="{ 'active': activeSideTab === tab.id }">
                                            <span x-text="tab.label"></span>
                                            <span class="text-[12px]" x-text="`(${tab.count})`"></span>
                                        </button>
                                    </template>
                                </nav>
                            </aside>

                            <div class="bg-[#edf2f5] p-4 lg:p-5">
                                <div class="mb-3 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                                    <button
                                        type="button"
                                        class="legacy-delete w-fit rounded-full border border-[var(--layout-border)] bg-white px-5 py-2 text-[13px] font-medium text-[var(--layout-text-soft)]"
                                        :disabled="selectedIds.length === 0"
                                        @click="deleteSelected()">
                                        Delete
                                    </button>

                                    <div class="flex items-center gap-3 self-start lg:self-auto">
                                        <label class="relative block">
                                            <span class="sr-only">Search for survey template by name</span>
                                            <input
                                                x-model.trim="searchTerm"
                                                @input="page = 1"
                                                type="search"
                                                placeholder="Search for survey template by name"
                                                class="legacy-toolbar-input h-9 w-[250px] rounded-sm px-3 pr-9 text-[12px] outline-none focus:border-webropol-primary-500 focus:ring-2 focus:ring-webropol-primary-100">
                                            <i class="fal fa-search pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-[15px] text-[var(--layout-text-soft)]"></i>
                                        </label>
                                    </div>
                                </div>

                                <div class="legacy-table overflow-hidden">
                                    <table class="min-w-full border-collapse">
                                        <thead>
                                            <tr>
                                                <th class="w-11 px-4 py-2 text-left">
                                                    <input
                                                        type="checkbox"
                                                        class="legacy-checkbox h-4 w-4"
                                                        :checked="allVisibleSelected()"
                                                        :disabled="pagedTemplates().length === 0"
                                                        @change="toggleSelectAll($event.target.checked)">
                                                </th>
                                                <th class="px-4 py-2 text-left">
                                                    <button type="button" class="inline-flex items-center gap-1" @click="sortBy('name')">
                                                        <span>Template name</span>
                                                        <i class="fal" :class="sortIcon('name')"></i>
                                                    </button>
                                                </th>
                                                <th class="px-4 py-2 text-left">Created by</th>
                                                <th class="px-4 py-2 text-left">
                                                    <button type="button" class="inline-flex items-center gap-1" @click="sortBy('lastModified')">
                                                        <span>Last modified</span>
                                                        <i class="fal" :class="sortIcon('lastModified')"></i>
                                                    </button>
                                                </th>
                                                <th class="px-4 py-2 text-left">Rename</th>
                                                <th class="px-4 py-2 text-left">Share to</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template x-if="pagedTemplates().length === 0">
                                                <tr>
                                                    <td colspan="6" class="px-4 py-6 text-center text-[12px] text-[var(--layout-text-soft)]">No data available</td>
                                                </tr>
                                            </template>
                                            <template x-for="template in pagedTemplates()" :key="template.id">
                                                <tr class="bg-white hover:bg-webropol-primary-50/30">
                                                    <td class="px-4 py-3 align-middle">
                                                        <input
                                                            type="checkbox"
                                                            class="legacy-checkbox h-4 w-4"
                                                            :checked="selectedIds.includes(template.id)"
                                                            @change="toggleSelection(template.id)">
                                                    </td>
                                                    <td class="px-4 py-3 align-middle font-medium" x-text="template.name"></td>
                                                    <td class="px-4 py-3 align-middle" x-text="template.createdBy"></td>
                                                    <td class="px-4 py-3 align-middle" x-text="template.lastModified"></td>
                                                    <td class="px-4 py-3 align-middle">
                                                        <button type="button" class="legacy-action text-[12px] font-medium" @click="renameTemplate(template)">Rename</button>
                                                    </td>
                                                    <td class="px-4 py-3 align-middle">
                                                        <button type="button" class="legacy-action text-[12px] font-medium" @click="shareTemplate(template)" x-text="template.sharedTo || 'Share'"></button>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>

                                <div class="mt-3 flex flex-col gap-3 text-[12px] text-[var(--layout-text-soft)] lg:flex-row lg:items-center lg:justify-between">
                                    <div class="flex items-center gap-3">
                                        <button type="button" class="disabled:opacity-40" :disabled="page === 1" @click="goToPage(1)">
                                            <i class="fal fa-step-backward"></i>
                                        </button>
                                        <button type="button" class="disabled:opacity-40" :disabled="page === 1" @click="goToPage(page - 1)">
                                            <i class="fal fa-caret-left mr-1"></i> Previous
                                        </button>
                                        <span>Page <span x-text="page"></span> / <span x-text="totalPages()"></span></span>
                                        <button type="button" class="disabled:opacity-40" :disabled="page === totalPages()" @click="goToPage(page + 1)">
                                            Next <i class="fal fa-caret-right ml-1"></i>
                                        </button>
                                        <button type="button" class="disabled:opacity-40" :disabled="page === totalPages()" @click="goToPage(totalPages())">
                                            <i class="fal fa-step-forward"></i>
                                        </button>
                                    </div>

                                    <div class="flex flex-wrap items-center gap-2">
                                        <span>Show on page</span>
                                        <template x-for="size in pageSizes" :key="String(size)">
                                            <button
                                                type="button"
                                                class="legacy-page-link px-1"
                                                :class="{ 'active': pageSize === size }"
                                                @click="setPageSize(size)"
                                                x-text="size"></button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script>
        function layoutTemplatesApp() {
            return {
                storageKey: 'webropol_layout_templates',
                activeTopTab: 'survey',
                activeSideTab: 'own',
                searchTerm: '',
                sortKey: 'name',
                sortDirection: 'asc',
                page: 1,
                pageSize: 20,
                pageSizes: [20, 50, 100, 'All'],
                selectedIds: [],
                topTabs: [
                    { id: 'survey', label: 'Survey templates' },
                    { id: 'reporting', label: 'Reporting templates' },
                    { id: 'event', label: 'Event templates' }
                ],
                templates: {
                    survey: { own: [], shared: [] },
                    reporting: { own: [], shared: [] },
                    event: { own: [], shared: [] }
                },

                init() {
                    this.loadTemplates();
                },

                defaultTemplates() {
                    return {
                        survey: {
                            own: [],
                            shared: [
                                { id: 'survey-shared-1', name: 'Employee Pulse Layout', createdBy: 'Webropol Team', lastModified: '04 Mar 2026', sharedTo: 'Workspace' },
                                { id: 'survey-shared-2', name: 'Customer Satisfaction Classic', createdBy: 'Research Ops', lastModified: '28 Feb 2026', sharedTo: 'Workspace' },
                                { id: 'survey-shared-3', name: 'NPS Compact Layout', createdBy: 'Insight Studio', lastModified: '17 Feb 2026', sharedTo: 'Workspace' },
                                { id: 'survey-shared-4', name: 'Brand Tracker Form', createdBy: 'Webropol Team', lastModified: '11 Feb 2026', sharedTo: 'Workspace' }
                            ]
                        },
                        reporting: {
                            own: [
                                { id: 'report-own-1', name: 'Executive Summary View', createdBy: 'Ali Al-Zuhairi', lastModified: '02 Mar 2026', sharedTo: '' }
                            ],
                            shared: [
                                { id: 'report-shared-1', name: 'Board Reporting Layout', createdBy: 'Webropol Team', lastModified: '25 Feb 2026', sharedTo: 'Workspace' },
                                { id: 'report-shared-2', name: 'Insight Dashboard Export', createdBy: 'Analytics Team', lastModified: '20 Feb 2026', sharedTo: 'Workspace' }
                            ]
                        },
                        event: {
                            own: [],
                            shared: [
                                { id: 'event-shared-1', name: 'Registration Confirmation Flow', createdBy: 'Events Team', lastModified: '06 Mar 2026', sharedTo: 'Workspace' },
                                { id: 'event-shared-2', name: 'Event Follow-up Summary', createdBy: 'Webropol Team', lastModified: '19 Feb 2026', sharedTo: 'Workspace' }
                            ]
                        }
                    };
                },

                loadTemplates() {
                    const defaults = this.defaultTemplates();

                    try {
                        const existing = JSON.parse(localStorage.getItem(this.storageKey) || '{}');
                        this.templates = {
                            survey: {
                                own: Array.isArray(existing?.survey?.own) ? existing.survey.own : defaults.survey.own,
                                shared: Array.isArray(existing?.survey?.shared) ? existing.survey.shared : defaults.survey.shared
                            },
                            reporting: {
                                own: Array.isArray(existing?.reporting?.own) ? existing.reporting.own : defaults.reporting.own,
                                shared: Array.isArray(existing?.reporting?.shared) ? existing.reporting.shared : defaults.reporting.shared
                            },
                            event: {
                                own: Array.isArray(existing?.event?.own) ? existing.event.own : defaults.event.own,
                                shared: Array.isArray(existing?.event?.shared) ? existing.event.shared : defaults.event.shared
                            }
                        };
                    } catch (error) {
                        console.error('localStorage error:', error);
                        this.templates = defaults;
                    }
                },

                saveTemplates() {
                    try {
                        const existing = JSON.parse(localStorage.getItem(this.storageKey) || '{}');
                        const merged = {
                            ...existing,
                            survey: this.templates.survey,
                            reporting: this.templates.reporting,
                            event: this.templates.event
                        };

                        localStorage.setItem(this.storageKey, JSON.stringify(merged));
                    } catch (error) {
                        console.error('localStorage error:', error);
                    }
                },

                sideTabs() {
                    const section = this.templates[this.activeTopTab];
                    return [
                        { id: 'own', label: 'Own templates', count: section.own.length },
                        { id: 'shared', label: 'Shared templates', count: section.shared.length }
                    ];
                },

                setTopTab(tabId) {
                    this.activeTopTab = tabId;
                    this.activeSideTab = 'own';
                    this.resetListState();
                },

                setSideTab(tabId) {
                    this.activeSideTab = tabId;
                    this.resetListState();
                },

                resetListState() {
                    this.searchTerm = '';
                    this.selectedIds = [];
                    this.page = 1;
                },

                currentTemplates() {
                    return this.templates[this.activeTopTab][this.activeSideTab];
                },

                filteredTemplates() {
                    const term = this.searchTerm.toLowerCase();
                    return this.currentTemplates().filter((template) => {
                        if (!term) {
                            return true;
                        }

                        return [template.name, template.createdBy, template.lastModified].some((value) => String(value || '').toLowerCase().includes(term));
                    });
                },

                sortedTemplates() {
                    const direction = this.sortDirection === 'asc' ? 1 : -1;
                    return [...this.filteredTemplates()].sort((left, right) => {
                        const leftValue = String(left[this.sortKey] || '').toLowerCase();
                        const rightValue = String(right[this.sortKey] || '').toLowerCase();

                        if (leftValue < rightValue) {
                            return -1 * direction;
                        }

                        if (leftValue > rightValue) {
                            return 1 * direction;
                        }

                        return 0;
                    });
                },

                pagedTemplates() {
                    const templates = this.sortedTemplates();
                    if (this.pageSize === 'All') {
                        return templates;
                    }

                    const start = (this.page - 1) * this.pageSize;
                    return templates.slice(start, start + this.pageSize);
                },

                totalPages() {
                    if (this.pageSize === 'All') {
                        return 1;
                    }

                    return Math.max(1, Math.ceil(this.sortedTemplates().length / this.pageSize));
                },

                goToPage(nextPage) {
                    this.page = Math.min(this.totalPages(), Math.max(1, nextPage));
                },

                setPageSize(size) {
                    this.pageSize = size;
                    this.page = 1;
                },

                sortBy(key) {
                    if (this.sortKey === key) {
                        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        this.sortKey = key;
                        this.sortDirection = 'asc';
                    }
                },

                sortIcon(key) {
                    if (this.sortKey !== key) {
                        return 'fa-sort text-[10px]';
                    }

                    return this.sortDirection === 'asc' ? 'fa-sort-up text-[10px]' : 'fa-sort-down text-[10px]';
                },

                toggleSelection(templateId) {
                    if (this.selectedIds.includes(templateId)) {
                        this.selectedIds = this.selectedIds.filter((id) => id !== templateId);
                        return;
                    }

                    this.selectedIds = [...this.selectedIds, templateId];
                },

                allVisibleSelected() {
                    const visibleIds = this.pagedTemplates().map((template) => template.id);
                    return visibleIds.length > 0 && visibleIds.every((id) => this.selectedIds.includes(id));
                },

                toggleSelectAll(checked) {
                    const visibleIds = this.pagedTemplates().map((template) => template.id);

                    if (checked) {
                        this.selectedIds = Array.from(new Set([...this.selectedIds, ...visibleIds]));
                        return;
                    }

                    this.selectedIds = this.selectedIds.filter((id) => !visibleIds.includes(id));
                },

                deleteSelected() {
                    const list = this.currentTemplates().filter((template) => !this.selectedIds.includes(template.id));
                    this.templates[this.activeTopTab][this.activeSideTab] = list;
                    this.selectedIds = [];
                    this.saveTemplates();
                    this.goToPage(this.page);
                },

                renameTemplate(template) {
                    const nextName = window.prompt('Rename template', template.name);
                    if (!nextName || !nextName.trim()) {
                        return;
                    }

                    template.name = nextName.trim();
                    template.lastModified = this.formatToday();
                    this.saveTemplates();
                },

                shareTemplate(template) {
                    template.sharedTo = template.sharedTo ? '' : 'Workspace';
                    template.lastModified = this.formatToday();
                    this.saveTemplates();
                },

                formatToday() {
                    return new Date().toLocaleDateString('en-GB', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric'
                    });
                }
            };
        }
    </script>
</body>

</html>
